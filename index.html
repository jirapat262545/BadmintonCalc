<body>
<div id="root"></div>

<script type="text/babel">
const { useState, useEffect, useRef, useMemo, useCallback } = React;

/* ═══════════════════════════════════════════
   STORAGE KEY & HELPERS
═══════════════════════════════════════════ */
const STORAGE_KEY = 'badminton_split_v2';

function loadFromStorage() {
  try {
    const raw = localStorage.getItem(STORAGE_KEY);
    if (!raw) return null;
    return JSON.parse(raw);
  } catch {
    return null;
  }
}

function saveToStorage(data) {
  try {
    localStorage.setItem(STORAGE_KEY, JSON.stringify(data));
    return true;
  } catch {
    return false;
  }
}

/* ═══════════════════════════════════════════
   UTILS
═══════════════════════════════════════════ */
const t2m = t => {
  if (!t?.includes(':')) return 0;
  const [h, m] = t.split(':').map(Number);
  return h * 60 + m;
};
const uid = () => Math.random().toString(36).slice(2, 9);
const fmt = (n, round) =>
  round
    ? Math.round(n).toLocaleString('th-TH')
    : parseFloat(n.toFixed(2)).toLocaleString('th-TH', { minimumFractionDigits: 0, maximumFractionDigits: 2 });

const BCLS = ['bc0','bc1','bc2','bc3','bc4'];
const BICO = ['🟢','🔵','🟠','🟣','🟡'];
const BBDR = ['rgba(163,230,53,.35)','rgba(56,189,248,.35)','rgba(251,146,60,.35)','rgba(216,180,254,.35)','rgba(251,191,36,.35)'];
const BBBG = ['rgba(163,230,53,.05)','rgba(56,189,248,.05)','rgba(251,146,60,.05)','rgba(216,180,254,.05)','rgba(251,191,36,.05)'];
const bCls = i => BCLS[i % 5];
const bIco = i => BICO[i % 5];

/* ═══════════════════════════════════════════
   CALCULATION ENGINE
═══════════════════════════════════════════ */
function buildShuttleList(batches) {
  const list = []; let num = 1;
  batches.forEach((b, bi) => {
    for (let i = 0; i < Math.max(0, Number(b.count) || 0); i++)
      list.push({ shuttleNo: num++, batchIdx: bi, price: Number(b.price) || 0 });
  });
  return list;
}

function calculate(courts, batches) {
  const shuttles = buildShuttleList(batches);
  if (!shuttles.length) return null;

  // รวม players จากทุก court พร้อม tag courtId
  const allPlayers = courts.flatMap(c => c.players.map(p => ({ ...p, courtId: c.id })));
  if (!allPlayers.length) return null;

  // ── ค่าสนาม: คำนวณแยกต่อ court ──
  const courtCosts = Object.fromEntries(allPlayers.map(p => [p.id, 0]));
  courts.forEach(court => {
    const sMin = t2m(court.sessionStart), eMin = t2m(court.sessionEnd);
    if (eMin <= sMin || !court.players.length) return;
    const slots = [];
    for (let t = sMin; t < eMin; t += 60)
      slots.push({ start: t, end: Math.min(t + 60, eMin) });
    slots.forEach(sl => {
      const f = (sl.end - sl.start) / 60;
      const active = court.players.filter(p => t2m(p.startTime) < sl.end && t2m(p.endTime) > sl.start);
      if (!active.length) return;
      const cpp = Number(court.courtPricePerHour) * f / active.length;
      active.forEach(p => (courtCosts[p.id] += cpp));
    });
  });

  // ── ค่าลูก: pool รวมทุก court ──
  const shutCosts  = Object.fromEntries(allPlayers.map(p => [p.id, 0]));
  const batchCosts = Object.fromEntries(allPlayers.map(p => [p.id, batches.map(() => 0)]));
  shuttles.forEach(({ shuttleNo, batchIdx, price }) => {
    const using = allPlayers.filter(p => Number(p.shuttleStart) <= shuttleNo && Number(p.shuttleEnd) >= shuttleNo);
    if (!using.length) return;
    const cpp = price / using.length;
    using.forEach(p => { shutCosts[p.id] += cpp; batchCosts[p.id][batchIdx] += cpp; });
  });

  // ── จัดกลุ่ม results ต่อ court ──
  const courtResults = courts.map(court => ({
    courtId: court.id,
    courtName: court.name,
    results: court.players.map(p => ({
      id: p.id, name: p.name,
      startTime: p.startTime, endTime: p.endTime,
      shuttleStart: p.shuttleStart, shuttleEnd: p.shuttleEnd,
      courtCost:   courtCosts[p.id] || 0,
      shuttleCost: shutCosts[p.id]  || 0,
      batchCosts:  batchCosts[p.id],
      total: (courtCosts[p.id] || 0) + (shutCosts[p.id] || 0),
    })),
  }));

  const allResults   = courtResults.flatMap(c => c.results);
  const totalCourt   = allResults.reduce((s, r) => s + r.courtCost,   0);
  const totalShuttle = allResults.reduce((s, r) => s + r.shuttleCost, 0);
  const grandTotal   = totalCourt + totalShuttle;
  return { courtResults, allResults, totalCourt, totalShuttle, grandTotal, totalShuttlesUsed: shuttles.length, shuttles };
}

function validate(courts, batches) {
  const errs  = [];
  const totalS = buildShuttleList(batches).length;
  if (!totalS) errs.push('⚠️ ต้องมีลูกแบดอย่างน้อย 1 ลูก');
  batches.forEach((b, i) => {
    if (Number(b.count) < 1)  errs.push(`⚠️ [ชุดที่ ${i+1}] จำนวนลูกต้องอย่างน้อย 1`);
    if (Number(b.price) <= 0) errs.push(`⚠️ [ชุดที่ ${i+1}] ราคาต้องมากกว่า 0`);
  });
  courts.forEach((court, ci) => {
    const cLbl = court.name || `สนาม ${ci+1}`;
    const sMin = t2m(court.sessionStart), eMin = t2m(court.sessionEnd);
    if (eMin <= sMin)                         errs.push(`⚠️ [${cLbl}] เวลาสิ้นสุดต้องมากกว่าเวลาเริ่มเล่น`);
    if (Number(court.courtPricePerHour) <= 0) errs.push(`⚠️ [${cLbl}] ค่าสนามต้องมากกว่า 0`);
    court.players.forEach((p, i) => {
      const lbl = p.name || `ผู้เล่นคนที่ ${i+1}`;
      const ps = t2m(p.startTime), pe = t2m(p.endTime);
      if (!p.name.trim())  errs.push(`⚠️ [${cLbl}] [${lbl}] กรุณากรอกชื่อ`);
      if (pe <= ps)        errs.push(`⚠️ [${cLbl}] [${lbl}] เวลาหยุดต้องมากกว่าเวลาเริ่ม`);
      if (ps < sMin || pe > eMin) errs.push(`⚠️ [${cLbl}] [${lbl}] เวลาต้องอยู่ในช่วง ${court.sessionStart}–${court.sessionEnd}`);
      if (Number(p.shuttleStart) > Number(p.shuttleEnd)) errs.push(`⚠️ [${cLbl}] [${lbl}] ลูกเริ่มต้องน้อยกว่าหรือเท่ากับลูกสุดท้าย`);
      if (Number(p.shuttleEnd) > totalS) errs.push(`⚠️ [${cLbl}] [${lbl}] ลูกสุดท้าย (${p.shuttleEnd}) เกินจำนวนลูกทั้งหมด (${totalS})`);
    });
  });
  return errs;
}

/* ═══════════════════════════════════════════
   DEFAULT / EXAMPLE DATA
═══════════════════════════════════════════ */
const DEFAULT_COURTS  = [makeCourt(0)];
const DEFAULT_BATCHES = [{ id: uid(), count: 7, price: 80, label: '' }];

        {id:uid(),name:'นาย',  startTime:'18:00',endTime:'19:00',shuttleStart:1,shuttleEnd:4},
        {id:uid(),name:'เอิท', startTime:'18:00',endTime:'21:00',shuttleStart:2,shuttleEnd:7},
        {id:uid(),name:'ดรอย', startTime:'18:00',endTime:'21:00',shuttleStart:1,shuttleEnd:7},
      ],
    },
    {
      id: uid(), name: 'สนาม B', courtPricePerHour: 160,
      sessionStart: '18:00', sessionEnd: '20:00',
      players: [
        {id:uid(),name:'มาชร์',startTime:'18:00',endTime:'20:00',shuttleStart:1,shuttleEnd:7},
        {id:uid(),name:'ปริ้น',startTime:'18:00',endTime:'20:00',shuttleStart:1,shuttleEnd:7},
        {id:uid(),name:'บิว',  startTime:'18:00',endTime:'20:00',shuttleStart:2,shuttleEnd:7},
        {id:uid(),name:'ปิ่น', startTime:'19:00',endTime:'20:00',shuttleStart:3,shuttleEnd:7},
      ],

  ],
  batches: [
    { id: uid(), count: 3, price: 50, label: 'ลูกของดิฟ' },

  ],

const makeBatch  = () => ({ id: uid(), count: 1, price: 80, label: '' });

/* ═══════════════════════════════════════════
   SHARP EXPORT
═══════════════════════════════════════════ */
async function exportSharpImage(element) {
  await document.fonts.ready;
  const dpr = window.devicePixelRatio || 1;
  const scale = Math.max(3, dpr * 2);
  return html2canvas(element, {
    backgroundColor: '#0a1a0f', scale, useCORS: true,
    allowTaint: false, logging: false, letterRendering: true, imageTimeout: 0,
    onclone: (doc) => {
      const s = doc.createElement('style');
      s.innerHTML = `* { -webkit-font-smoothing:antialiased!important; text-rendering:optimizeLegibility!important; } body{background:#0a1a0f;}`;
      doc.head.appendChild(s);
      const l = doc.createElement('link');
      l.rel = 'stylesheet';
      l.href = 'https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap';
      doc.head.appendChild(l);
    },
  });
}

/* ═══════════════════════════════════════════
   COMPONENTS
═══════════════════════════════════════════ */
function ShuttleMap({ batches }) {
  const shuttles = buildShuttleList(batches);
  if (!shuttles.length) return null;
  return (
    <div style={{ marginTop: 14 }}>
      <p className="lbl" style={{ marginBottom: 7 }}>แผนผังลำดับลูก</p>
      <div style={{ display: 'flex', flexWrap: 'wrap', gap: 4, marginBottom: 8 }}>
        {shuttles.map(({ shuttleNo, batchIdx }) => (
          <span key={shuttleNo} className={`batch-tag ${bCls(batchIdx)}`}>{shuttleNo}</span>
        ))}
      </div>
      <div style={{ display: 'flex', flexWrap: 'wrap', gap: 6 }}>
        {batches.map((b, i) => {
          const mine = shuttles.filter(s => s.batchIdx === i);
          if (!mine.length) return null;
          return (
            <span key={b.id} className={`batch-tag ${bCls(i)}`} style={{ fontSize: 12, padding: '4px 10px' }}>
              {bIco(i)} ชุด{i+1}: ลูก {mine[0].shuttleNo}–{mine[mine.length-1].shuttleNo} · {b.price}฿
              {b.label ? ` · ${b.label}` : ''}
            </span>
          );
        })}
      </div>
    </div>
  );
}

function BatchRow({ batch, index, startNum, endNum, onChange, onRemove, canRemove }) {

    <div className="slide-in" style={{ marginBottom: 10, padding: 14, borderRadius: 12, border: `1px solid ${BBDR[index%5]}`, background: BBBG[index%5] }}>

          <span style={{ fontFamily: 'Bebas Neue', fontSize: 20, color: 'white', letterSpacing: 2 }}>ชุดที่ {index+1}</span>
          {Number(batch.count) > 0 && startNum <= endNum && (
            <span style={{ fontSize: 11, color: '#86efac', background: 'rgba(134,239,172,.1)', border: '1px solid rgba(134,239,172,.2)', borderRadius: 99, padding: '2px 8px' }}>

        <div>
          <label className="lbl">จำนวนลูก</label>

      {Number(batch.count) > 0 && Number(batch.price) > 0 && (
        <p style={{ marginTop: 8, color: '#86efac', fontSize: 13 }}>
          รวมชุดนี้: <strong style={{ color: '#a3e635' }}>{(Number(batch.count)*Number(batch.price)).toLocaleString('th-TH')} บาท</strong>
        </p>
      )}
    </div>

}

function PlayerRow({ player, index, courtId, sessionStart, sessionEnd, totalShuttles, batches, onChange, onRemove }) {
  const shuttles = buildShuttleList(batches);
  const bOf = n => shuttles.find(s => s.shuttleNo === Number(n))?.batchIdx ?? 0;
  const sb = bOf(player.shuttleStart), eb = bOf(player.shuttleEnd);
  return (
    <div className="slide-in card" style={{ marginBottom: 12, border: '1px solid #1f5229' }}>
      <div style={{ display: 'flex', alignItems: 'center', justifyContent: 'space-between', marginBottom: 10 }}>
        <span style={{ fontFamily: 'Bebas Neue', fontSize: 22, color: '#a3e635', letterSpacing: 2 }}>
          #{String(index+1).padStart(2,'0')}
        </span>
        <button className="btn-red" onClick={() => onRemove(courtId, player.id)}>✕ ลบ</button>
      </div>
      <div className="gp" style={{ display: 'grid', gridTemplateColumns: '1fr 1fr 1fr', gap: 10 }}>
        <div className="pn">
          <label className="lbl">ชื่อผู้เล่น</label>
          <input type="text" className="inp" placeholder="ชื่อ..."
            autoCapitalize="words" autoCorrect="off" autoComplete="name"
            value={player.name} onChange={e => onChange(courtId, player.id, 'name', e.target.value)} />
        </div>
        <div>
          <label className="lbl">เวลาเริ่ม</label>
          <input type="time" className="inp"
            value={player.startTime} onChange={e => onChange(courtId, player.id, 'startTime', e.target.value)} />
        </div>
        <div>
          <label className="lbl">เวลาหยุด</label>
          <input type="time" className="inp"
            value={player.endTime} onChange={e => onChange(courtId, player.id, 'endTime', e.target.value)} />
        </div>
        <div>
          <label className="lbl">ลูกที่เริ่มใช้</label>
          <input type="number" inputMode="numeric" className="inp" min={1} max={totalShuttles || 99}
            value={player.shuttleStart} onChange={e => onChange(courtId, player.id, 'shuttleStart', Number(e.target.value))} />
          {totalShuttles > 0 && (

          {totalShuttles > 0 && (
            <span className={`batch-tag ${bCls(eb)}`} style={{ marginTop: 5 }}>{bIco(eb)} ชุด {eb+1}</span>
          )}
        </div>
      </div>
    </div>
  );
}

      {court.players.map((p, i) => (

function ResultsTable({ data, round, courts, batches }) {
  if (!data) return null;
  const { courtResults, allResults, totalCourt, totalShuttle, grandTotal, shuttles } = data;
  const multiBatch = batches.length > 1;
  return (
    <div className="fade-in">
      <div className="g3" style={{ display: 'grid', gridTemplateColumns: '1fr 1fr 1fr', gap: 10, marginBottom: 18 }}>
        {[
          { lbl: 'ค่าสนามรวม', v: totalCourt,   accent: false },
          { lbl: 'ค่าลูกรวม',  v: totalShuttle, accent: false },
          { lbl: 'รวมทั้งหมด', v: grandTotal,   accent: true  },
        ].map(c => (
          <div key={c.lbl} className="card" style={{ textAlign: 'center', padding: '14px 8px', border: c.accent ? '1px solid rgba(163,230,53,.45)' : '1px solid #1f5229', ...(c.accent ? { boxShadow: '0 0 18px rgba(163,230,53,.12)' } : {}) }}>
            <p style={{ color: c.accent ? '#a3e635' : '#4ade80', fontSize: 10, fontWeight: 700, textTransform: 'uppercase', letterSpacing: '.07em', marginBottom: 4 }}>{c.lbl}</p>
            <p style={{ color: c.accent ? '#a3e635' : 'white', fontFamily: 'Bebas Neue', fontSize: 24, lineHeight: 1 }}>{fmt(c.v, round)}</p>
            <p style={{ color: c.accent ? '#65a30d' : '#166534', fontSize: 11, marginTop: 2 }}>บาท</p>
          </div>
        ))}
      </div>

      {/* Info tags */}
      <div style={{ display: 'flex', flexWrap: 'wrap', gap: 7, marginBottom: 14 }}>
        {courts.map(c => (
          <span key={c.id} style={{ background: '#0f2a17', border: '1px solid #1f5229', color: '#86efac', borderRadius: 99, padding: '4px 11px', fontSize: 12 }}>
            🏟️ {c.name}: {c.sessionStart}–{c.sessionEnd} · {c.courtPricePerHour}฿/ชม.
          </span>
        ))}
        <span style={{ background: '#0f2a17', border: '1px solid #1f5229', color: '#86efac', borderRadius: 99, padding: '4px 11px', fontSize: 12 }}>
          🏸 {data.totalShuttlesUsed} ลูก รวม ฿{fmt(totalShuttle, round)}
        </span>
      </div>

      {/* ตารางแยกต่อ court */}
      {courtResults.map(cr => (
        <div key={cr.courtId} style={{ marginBottom: 18 }}>
          <p style={{ color: '#4ade80', fontSize: 12, fontWeight: 700, textTransform: 'uppercase', letterSpacing: '.06em', marginBottom: 8 }}>
            🏟️ {cr.courtName}
          </p>
          <div className="scroll-x" style={{ borderRadius: 12, border: '1px solid #173d21' }}>
            <table className="rtable">
              <thead>
                <tr>
                  <th style={{ textAlign: 'left' }}>ชื่อ</th>
                  <th>เวลา</th><th>ลูก</th><th>ค่าสนาม</th>
                  {multiBatch ? batches.map((b,i) => { const mine=shuttles.filter(s=>s.batchIdx===i); if(!mine.length) return null; return <th key={b.id}>{bIco(i)}ชุด{i+1}<br/><span style={{fontSize:9}}>{mine[0].shuttleNo}–{mine[mine.length-1].shuttleNo}</span></th>; }) : <th>ค่าลูก</th>}
                  <th style={{ color: '#a3e635' }}>รวม</th>
                </tr>
              </thead>
              <tbody>
                {cr.results.map(r => (
                  <tr key={r.id}>
                    <td>{r.name}</td>
                    <td style={{ fontSize: 11, color: '#86efac' }}>{r.startTime}–{r.endTime}</td>
                    <td style={{ fontSize: 11, color: '#86efac' }}>{r.shuttleStart}–{r.shuttleEnd}</td>
                    <td>{fmt(r.courtCost, round)}</td>
                    {multiBatch ? batches.map((b,i) => { const mine=shuttles.filter(s=>s.batchIdx===i); if(!mine.length) return null; return <td key={b.id}>{fmt(r.batchCosts[i]||0,round)}</td>; }) : <td>{fmt(r.shuttleCost,round)}</td>}
                    <td className="lime-col">฿{fmt(r.total, round)}</td>
                  </tr>
                ))}
              </tbody>
            </table>
          </div>
        </div>
      ))}

      {/* Grand Total */}
      <div className="scroll-x" style={{ borderRadius: 12, border: '1px solid rgba(163,230,53,.3)', boxShadow: '0 0 16px rgba(163,230,53,.1)' }}>
        <table className="rtable">
          <tfoot>
            <tr>
              <td colSpan={3} style={{ textAlign: 'left', color: '#4ade80', fontSize: 10, textTransform: 'uppercase', letterSpacing: '.06em' }}>
                รวมทั้งหมด ({courts.length} สนาม)
              </td>
              <td>{fmt(totalCourt, round)}</td>
              {multiBatch ? batches.map((b,i) => { const mine=shuttles.filter(s=>s.batchIdx===i); if(!mine.length) return null; return <td key={b.id}>{fmt(allResults.reduce((s,r)=>s+(r.batchCosts[i]||0),0),round)}</td>; }) : <td>{fmt(totalShuttle,round)}</td>}
              <td className="lime-col" style={{ fontSize: 15 }}>฿{fmt(grandTotal, round)}</td>
            </tr>
          </tfoot>
        </table>
      </div>
    </div>
  );
}

/* ═══════════════════════════════════════════
   MAIN APP

function App() {
  // ── Load saved state or use defaults ──
  const saved = useMemo(() => loadFromStorage(), []);

  const [courts,  setCourts]  = useState(() => saved?.courts  || DEFAULT_COURTS);
  const [batches, setBatches] = useState(() => saved?.batches || DEFAULT_BATCHES);
  const [round,   setRound]   = useState(saved?.round || false);
  const [loading,    setLoading]    = useState(false);
  const [saveStatus, setSaveStatus] = useState('saved');
  const [toast,      setToast]      = useState(null);
  const resultRef = useRef(null);
  const saveTimer = useRef(null);

  // ── Auto-save (debounced 600ms) ──
  useEffect(() => {
    setSaveStatus('saving');
    clearTimeout(saveTimer.current);
    saveTimer.current = setTimeout(() => {
      saveToStorage({ courts, batches, round });
      setSaveStatus('saved');
    }, 600);
    return () => clearTimeout(saveTimer.current);
  }, [courts, batches, round]);

  // ── Derived (ไม่ต้องใช้ useEffect) ──
  const errors = validate(courts, batches);
  const result = errors.length === 0 ? calculate(courts, batches) : null;

  const showToast = useCallback((msg) => { setToast(msg); setTimeout(() => setToast(null), 2500); }, []);

  const batchNums = useMemo(() => {
    let num = 1;
    return batches.map(b => { const s=num, cnt=Math.max(0,Number(b.count)||0); num+=cnt; return { start:s, end:s+cnt-1 }; });
  }, [batches]);
  const totalShuttles = useMemo(() => buildShuttleList(batches).length, [batches]);

  // ── Court handlers ──
  const addCourt    = () => setCourts(p => [...p, makeCourt(p.length)]);
  const removeCourt = (courtId) => setCourts(p => p.filter(c => c.id !== courtId));
  const updateCourt = useCallback((courtId, field, value) => {
    setCourts(p => p.map(c => c.id === courtId ? { ...c, [field]: value } : c));
  }, []);

  // ── Player handlers ──
  const addPlayer = (courtId) => {
    setCourts(p => p.map(c => c.id === courtId
      ? { ...c, players: [...c.players, makePlayer(c.sessionStart)] }
      : c
    ));
  };
  const removePlayer = useCallback((courtId, playerId) => {
    setCourts(p => p.map(c => c.id === courtId
      ? { ...c, players: c.players.filter(pl => pl.id !== playerId) }
      : c
    ));
  }, []);
  const updatePlayer = useCallback((courtId, playerId, field, value) => {
    setCourts(p => p.map(c => c.id === courtId
      ? { ...c, players: c.players.map(pl => pl.id === playerId ? { ...pl, [field]: value } : pl) }
      : c
    ));
  }, []);

  // ── Batch handlers ──
  const updB = useCallback((id, k, v) => setBatches(p => p.map(b => b.id===id ? { ...b, [k]: v } : b)), []);

  const loadExample = () => {
    const ex = makeExample();
    setCourts(ex.courts); setBatches(ex.batches);
    showToast('โหลดข้อมูลตัวอย่างแล้ว ✅');
  };

  const clearAll = () => {
    if (!window.confirm('ล้างข้อมูลทั้งหมด?\n(ข้อมูลที่บันทึกไว้จะถูกลบออกด้วย)')) return;
    localStorage.removeItem('badminton_split_v2');
    setCourts([makeCourt(0)]); setBatches([makeBatch()]); setRound(false);
    showToast('ล้างข้อมูลแล้ว 🗑️');
  };

  const handleExport = async () => {
    if (!resultRef.current) return;
    setLoading(true);
    try {
      await new Promise(r => setTimeout(r, 80));
      const canvas = await exportSharpImage(resultRef.current);
      const link = document.createElement('a');
      link.download = `badminton-split-${new Date().toLocaleDateString('th-TH').replace(/\//g,'-')}.png`;
      link.href = canvas.toDataURL('image/png', 1.0);
      link.click();
      showToast('Export สำเร็จ! 📸');
    } catch (e) { alert('Export ล้มเหลว: ' + e.message); }
    finally { setLoading(false); }
  };

  const copyText = async () => {
    if (!result) return;
    const { courtResults, totalCourt, totalShuttle, grandTotal } = result;
    const lines = [`🏸 Badminton Split — ${courts.length} สนาม`, '─'.repeat(44)];
    courtResults.forEach(cr => {
      lines.push(`🏟️ ${cr.courtName}`);
      cr.results.forEach(r =>
        lines.push(`  ${r.name.padEnd(6)} สนาม:${fmt(r.courtCost,round).padStart(8)} | ลูก:${fmt(r.shuttleCost,round).padStart(8)} | รวม: ฿${fmt(r.total,round)}`)
      );
    });
    lines.push('─'.repeat(44));
    lines.push(`ค่าสนามรวม : ฿${fmt(totalCourt,round)}`);
    lines.push(`ค่าลูกรวม  : ฿${fmt(totalShuttle,round)}`);
    lines.push(`รวมทั้งหมด : ฿${fmt(grandTotal,round)}`);
    try { await navigator.clipboard.writeText(lines.join('\n')); showToast('คัดลอกแล้ว! 📋'); }
    catch { alert('ไม่สามารถคัดลอกได้ กรุณาใช้ Export รูปแทนครับ'); }
  };

  const H2 = { fontFamily: 'Bebas Neue', fontSize: 26, color: '#a3e635', letterSpacing: 4, margin: 0 };

  return (
    <div style={{ minHeight: '100vh', background: '#0a1a0f' }}>

      {loading && (
        <div className="overlay">
          <div className="spinner" />
          <p style={{ color: '#a3e635', fontFamily: 'Bebas Neue', fontSize: 22, letterSpacing: 3 }}>กำลัง Export...</p>
          <p style={{ color: '#4ade80', fontSize: 13 }}>กรุณารอสักครู่ กำลังเรนเดอร์ภาพ</p>
        </div>
      )}

      {toast && <div className="toast">{toast}</div>}

      {/* HEADER */}
      <header className="safe-top" style={{ position: 'relative', overflow: 'hidden', background: '#050e07', borderBottom: '1px solid #173d21', padding: '22px 16px' }}>
        <div style={{ position: 'absolute', inset: 0, opacity: .05, pointerEvents: 'none' }}>
          <div style={{ position: 'absolute', top: 0, left: '50%', transform: 'translateX(-50%)', width: 1, height: '100%', background: '#a3e635' }} />
          <div style={{ position: 'absolute', top: '50%', left: 0, width: '100%', height: 1, background: '#a3e635' }} />
        </div>
        <div style={{ maxWidth: 820, margin: '0 auto', position: 'relative' }}>
          <div style={{ display: 'flex', alignItems: 'center', justifyContent: 'space-between' }}>
            <div>
              <h1 style={{ fontFamily: 'Bebas Neue', fontSize: 'clamp(28px,8vw,50px)', color: 'white', letterSpacing: 6, lineHeight: 1, margin: 0 }}>
                BADMINTON<span style={{ color: '#a3e635' }}>.</span>SPLIT
              </h1>
              <p style={{ color: '#22c55e', fontSize: 13, marginTop: 4, fontWeight: 500 }}>
                คำนวณค่าใช้จ่ายยุติธรรม · รองรับลูกหลายชุด-หลายราคา
              </p>
            </div>
            <span style={{ fontSize: 42, opacity: .85 }}>🏸</span>
          </div>

          {/* ── Save status bar ── */}
          <div style={{ marginTop: 10, display: 'flex', alignItems: 'center', gap: 8 }}>
            <span className={`save-dot ${saveStatus === 'saving' ? 'saving' : ''}`}>
              <span className="dot" />
              {saveStatus === 'saving' ? 'กำลังบันทึก...' : 'บันทึกอัตโนมัติแล้ว'}
            </span>
            {saved && (
              <span style={{ fontSize: 11, color: '#1f5229' }}>
                · ข้อมูลจะอยู่แม้ปิด browser
              </span>
            )}
          </div>
        </div>
      </header>

      <main className="safe-bottom" style={{ maxWidth: 820, margin: '0 auto', padding: '20px 16px' }}>

        {/* Quick actions */}
        <div style={{ display: 'flex', flexWrap: 'wrap', gap: 8, marginBottom: 20 }}>
          <button className="btn-ghost" onClick={loadExample}>🧪 โหลดตัวอย่าง</button>
          <button className="btn-ghost" onClick={clearAll}>🗑️ ล้างข้อมูล</button>
        </div>

        {/* ── SHUTTLECOCK ── */}
        <section className="card" style={{ marginBottom: 14, border: '1px solid #1f5229' }}>
          <div style={{ display: 'flex', alignItems: 'flex-start', justifyContent: 'space-between', marginBottom: 14, gap: 10 }}>
            <div>
              <h2 style={H2}>SHUTTLECOCK</h2>
              <p style={{ color: '#4ade80', fontSize: 12, marginTop: 4 }}>ใช้ร่วมกันทุกสนาม · เพิ่มหลายชุดได้ · ราคาต่างกันได้ · ลูกนับต่อเนื่อง</p>
            </div>
            <button className="btn-lime" onClick={() => setBatches(p => [...p, makeBatch()])}>+ เพิ่มชุดลูก</button>
          </div>
          {batches.map((b, i) => (
            <BatchRow key={b.id} batch={b} index={i}
              startNum={batchNums[i].start} endNum={batchNums[i].end}
              onChange={updB} onRemove={id => setBatches(p => p.filter(x => x.id !== id))}
              canRemove={batches.length > 1} />
          ))}
          <ShuttleMap batches={batches} />
          {totalShuttles > 0 && (
            <div style={{ marginTop: 12, padding: '10px 14px', background: 'rgba(163,230,53,.06)', border: '1px solid rgba(163,230,53,.2)', borderRadius: 8 }}>
              <p style={{ color: '#a3e635', fontSize: 13, fontWeight: 700 }}>
                🏸 รวมลูกทั้งหมด: {totalShuttles} ลูก &nbsp;·&nbsp;
                ค่าลูกรวม: {batches.reduce((s,b)=>s+Number(b.count)*Number(b.price),0).toLocaleString('th-TH')} บาท
              </p>
            </div>
          )}
        </section>

        {/* ── COURTS ── */}
        <section style={{ marginBottom: 14 }}>
          <div style={{ display: 'flex', alignItems: 'center', justifyContent: 'space-between', marginBottom: 12 }}>
            <h2 style={H2}>COURTS <span style={{ color: '#166534', fontSize: 20 }}>({courts.length})</span></h2>
            <button className="btn-lime" onClick={addCourt}>+ เพิ่มสนาม</button>
          </div>
          <div style={{ display: 'flex', flexDirection: 'column', gap: 16 }}>
            {courts.map((court, i) => (
              <CourtCard
                key={court.id} court={court} courtIndex={i} courtCount={courts.length}
                batches={batches} totalShuttles={totalShuttles}
                onUpdateCourt={updateCourt} onUpdatePlayer={updatePlayer}
                onRemovePlayer={removePlayer} onAddPlayer={addPlayer}
                onRemoveCourt={removeCourt}
              />
            ))}
          </div>
        </section>

        {/* ── ERRORS ── */}
        {errors.length > 0 && (
          <div className="card" style={{ marginBottom: 14, background: 'rgba(220,38,38,.07)', border: '1px solid rgba(220,38,38,.3)' }}>
            <p style={{ color: '#f87171', fontWeight: 700, fontSize: 14, marginBottom: 8 }}>ตรวจพบข้อผิดพลาด:</p>
            {errors.map((e, i) => <p key={i} style={{ color: '#fca5a5', fontSize: 13, marginBottom: 4 }}>{e}</p>)}
          </div>
        )}

        {/* ── RESULTS ── */}
        {result && (
          <section>
            <div className="action-bar" style={{ display: 'flex', alignItems: 'center', justifyContent: 'space-between', gap: 8, marginBottom: 12 }}>
              <h2 style={H2}>RESULTS</h2>
              <div style={{ display: 'flex', flexWrap: 'wrap', gap: 8 }}>
                <button className="btn-toggle" onClick={() => setRound(r => !r)}
                  style={{ background: round?'#a3e635':'#0f2a17', color: round?'#050e07':'#4ade80', border: round?'1px solid #a3e635':'1px solid #173d21' }}>
                  {round ? '✓ ปัดเศษ' : '⊙ ปัดเศษ'}
                </button>
                <button className="btn-ghost" onClick={copyText}>📋 คัดลอก</button>
                <button className="btn-ghost" onClick={handleExport} style={{ background: '#132a13', borderColor: '#1f5229' }}>📸 Export</button>
              </div>
            </div>
            <div ref={resultRef} className="card export-snapshot" style={{ border: '1px solid #1f5229', padding: '18px 18px 22px' }}>
              <div style={{ display: 'flex', alignItems: 'center', justifyContent: 'space-between', marginBottom: 18, paddingBottom: 14, borderBottom: '1px solid #173d21' }}>
                <div>
                  <p style={{ fontFamily: 'Bebas Neue', fontSize: 22, color: 'white', letterSpacing: 4, margin: 0 }}>
                    BADMINTON<span style={{ color: '#a3e635' }}>.</span>SPLIT
                  </p>
                  <p style={{ color: '#4ade80', fontSize: 12, margin: '2px 0 0' }}>
                    สรุปค่าใช้จ่าย — {new Date().toLocaleDateString('th-TH', { year:'numeric', month:'long', day:'numeric' })}
                  </p>
                </div>
                <span style={{ fontSize: 28 }}>🏸</span>
              </div>
              <ResultsTable data={result} round={round} courts={courts} batches={batches} />
            </div>
          </section>
        )}

        {!result && errors.length === 0 && courts.every(c => c.players.length > 0) && (
          <div className="card" style={{ textAlign: 'center', padding: '28px', borderStyle: 'dashed', borderColor: '#1f5229', color: '#166534' }}>
            <p style={{ fontSize: 14 }}>กรอกข้อมูลให้ครบเพื่อดูผลลัพธ์อัตโนมัติ ✨</p>
          </div>
        )}

      </main>

      <footer style={{ maxWidth: 820, margin: '24px auto 0', padding: '0 16px 32px', textAlign: 'center', color: '#1f5229', fontSize: 12 }}>
        คำนวณตามเวลาจริงและลูกแบดที่ใช้จริง · ยุติธรรมกับทุกคน 🏸
      </footer>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
