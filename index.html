<script type="text/babel">
const { useState, useEffect, useRef, useMemo, useCallback } = React;

/* ══════════════════════════════════════════
   STORAGE
══════════════════════════════════════════ */
const STORAGE_KEY = 'badminton_split_v4';
const loadSaved = () => { try{const r=localStorage.getItem(STORAGE_KEY);return r?JSON.parse(r):null;}catch{return null;} };
const saveTo    = d  => { try{localStorage.setItem(STORAGE_KEY,JSON.stringify(d));return true;}catch{return false;} };

/* ══════════════════════════════════════════
   UTILS
══════════════════════════════════════════ */
const t2m = t => { if(!t?.includes(':'))return 0; const[h,m]=t.split(':').map(Number); return h*60+m; };
const uid = () => Math.random().toString(36).slice(2,9);
const fmt = (n,round) => round
  ? Math.round(n).toLocaleString('th-TH')
  : parseFloat(n.toFixed(2)).toLocaleString('th-TH',{minimumFractionDigits:0,maximumFractionDigits:2});

const BCLS=['bc0','bc1','bc2','bc3','bc4'];
const BICO=['🟢','🔵','🟠','🟣','🟡'];
const BBDR=['rgba(163,230,53,.35)','rgba(56,189,248,.35)','rgba(251,146,60,.35)','rgba(216,180,254,.35)','rgba(251,191,36,.35)'];
const BBBG=['rgba(163,230,53,.05)','rgba(56,189,248,.05)','rgba(251,146,60,.05)','rgba(216,180,254,.05)','rgba(251,191,36,.05)'];
const bCls=i=>BCLS[i%5], bIco=i=>BICO[i%5];

/* ══════════════════════════════════════════
   CALCULATION ENGINE
   Logic:
   - แต่ละ court มีเวลาเริ่ม-สิ้นสุดของตัวเอง
   - แบ่งเป็น time slots ทีละ 60 นาที
   - แต่ละ slot: รวมเฉพาะ court ที่เปิดอยู่ → หารด้วยคนที่อยู่ในช่วงนั้น
══════════════════════════════════════════ */
function buildShuttleList(batches) {
  const list=[]; let num=1;
  batches.forEach((b,bi)=>{
    for(let i=0;i<Math.max(0,Number(b.count)||0);i++)
      list.push({shuttleNo:num++,batchIdx:bi,price:Number(b.price)||0});
  });
  return list;
}

function calculate(courts, players, batches) {
  if(!courts||!courts.length||!players.length) return null;
  const shuttles=buildShuttleList(batches);
  if(!shuttles.length) return null;

  const allStarts=courts.map(c=>t2m(c.startTime)).filter(v=>v>0);
  const allEnds  =courts.map(c=>t2m(c.endTime)).filter(v=>v>0);
  if(!allStarts.length||!allEnds.length) return null;
  const globalStart=Math.min(...allStarts), globalEnd=Math.max(...allEnds);
  if(globalEnd<=globalStart) return null;

  // slots ทีละ 60 นาที
  const slots=[];
  for(let t=globalStart;t<globalEnd;t+=60)
    slots.push({start:t,end:Math.min(t+60,globalEnd)});

  const courtCosts=Object.fromEntries(players.map(p=>[p.id,0]));
  const shutCosts =Object.fromEntries(players.map(p=>[p.id,0]));
  const batchCosts=Object.fromEntries(players.map(p=>[p.id,batches.map(()=>0)]));

  slots.forEach(sl=>{
    // court ที่เปิดอยู่ใน slot นี้
    const openCourts=courts.filter(c=>t2m(c.startTime)<sl.end&&t2m(c.endTime)>sl.start);
    if(!openCourts.length) return;
    const slotRate=openCourts.reduce((s,c)=>s+(Number(c.price)||0),0);

    // ผู้เล่นที่อยู่ใน slot นี้
    const activePlayers=players.filter(p=>t2m(p.startTime)<sl.end&&t2m(p.endTime)>sl.start);
    if(!activePlayers.length) return;

    activePlayers.forEach(p=>{
      // overlap fraction ของ player ใน slot นี้
      const overlapStart=Math.max(sl.start,t2m(p.startTime));
      const overlapEnd  =Math.min(sl.end,  t2m(p.endTime));
      const frac=(overlapEnd-overlapStart)/60;
      courtCosts[p.id]+=slotRate*frac/activePlayers.length;
    });
  });

  shuttles.forEach(({shuttleNo,batchIdx,price})=>{
    const using=players.filter(p=>Number(p.shuttleStart)<=shuttleNo&&Number(p.shuttleEnd)>=shuttleNo);
    if(!using.length) return;
    const cpp=price/using.length;
    using.forEach(p=>{shutCosts[p.id]+=cpp;batchCosts[p.id][batchIdx]+=cpp;});
  });

  const results=players.map(p=>({
    id:p.id,name:p.name,
    startTime:p.startTime,endTime:p.endTime,
    shuttleStart:p.shuttleStart,shuttleEnd:p.shuttleEnd,
    courtCost:  courtCosts[p.id]||0,
    shuttleCost:shutCosts[p.id]||0,
    batchCosts: batchCosts[p.id],
    total:(courtCosts[p.id]||0)+(shutCosts[p.id]||0),
  }));

  const totalCourt  =results.reduce((s,r)=>s+r.courtCost,0);
  const totalShuttle=results.reduce((s,r)=>s+r.shuttleCost,0);
  return{results,totalCourt,totalShuttle,grandTotal:totalCourt+totalShuttle,totalShuttlesUsed:shuttles.length,shuttles};
}

/* ══════════════════════════════════════════
   VALIDATION
══════════════════════════════════════════ */
function validate(courts,players,batches) {
  const errs=[];
  if(!courts||!courts.length){
    errs.push('⚠️ ต้องมีสนามอย่างน้อย 1 สนาม');
  } else {
    courts.forEach((c,i)=>{
      const lbl=c.name||`สนามที่ ${i+1}`;
      if(!c.name)  errs.push(`⚠️ [สนามที่ ${i+1}] กรุณากรอกชื่อสนาม`);
      if(Number(c.price)<=0) errs.push(`⚠️ [${lbl}] ค่าสนามต้องมากกว่า 0`);
      if(!c.startTime) errs.push(`⚠️ [${lbl}] กรุณากรอกเวลาเริ่ม`);
      if(!c.endTime)   errs.push(`⚠️ [${lbl}] กรุณากรอกเวลาสิ้นสุด`);
      if(c.startTime&&c.endTime&&t2m(c.endTime)<=t2m(c.startTime))
        errs.push(`⚠️ [${lbl}] เวลาสิ้นสุดต้องมากกว่าเวลาเริ่ม`);
    });
  }
  const totalS=buildShuttleList(batches).length;
  if(!totalS) errs.push('⚠️ ต้องมีลูกแบดอย่างน้อย 1 ลูก');
  batches.forEach((b,i)=>{
    if(Number(b.count)<1)  errs.push(`⚠️ [ชุดที่ ${i+1}] จำนวนลูกต้องอย่างน้อย 1`);
    if(Number(b.price)<=0) errs.push(`⚠️ [ชุดที่ ${i+1}] ราคาต้องมากกว่า 0`);
  });
  if(courts&&courts.length){
    const starts=courts.map(c=>t2m(c.startTime)).filter(v=>v>0);
    const ends  =courts.map(c=>t2m(c.endTime)).filter(v=>v>0);
    if(starts.length&&ends.length){
      const gS=Math.min(...starts),gE=Math.max(...ends);
      players.forEach((p,i)=>{
        const lbl=p.name||`ผู้เล่นคนที่ ${i+1}`;
        const ps=t2m(p.startTime),pe=t2m(p.endTime);
        if(!p.name.trim()) errs.push(`⚠️ [${lbl}] กรุณากรอกชื่อ`);
        if(pe<=ps)         errs.push(`⚠️ [${lbl}] เวลาหยุดต้องมากกว่าเวลาเริ่ม`);
        if(ps<gS||pe>gE)   errs.push(`⚠️ [${lbl}] เวลาต้องอยู่ในช่วงที่สนามเปิด`);
        if(Number(p.shuttleStart)>Number(p.shuttleEnd)) errs.push(`⚠️ [${lbl}] ลูกเริ่มต้องน้อยกว่าหรือเท่ากับลูกสุดท้าย`);
        if(Number(p.shuttleEnd)>totalS) errs.push(`⚠️ [${lbl}] ลูกสุดท้าย (${p.shuttleEnd}) เกินจำนวนลูกทั้งหมด (${totalS})`);
      });
    }
  }
  return errs;
}

/* ══════════════════════════════════════════
   EXPORT
══════════════════════════════════════════ */
async function exportSharpImage(el) {
  await document.fonts.ready;
  const scale=Math.max(3,(window.devicePixelRatio||1)*2);
  return html2canvas(el,{
    backgroundColor:'#0a1a0f',scale,useCORS:true,logging:false,letterRendering:true,imageTimeout:0,
    onclone:doc=>{
      const s=doc.createElement('style');
      s.innerHTML='*{-webkit-font-smoothing:antialiased!important}body{background:#0a1a0f}';
      doc.head.appendChild(s);
    }
  });
}

/* ══════════════════════════════════════════
   COMPONENTS
══════════════════════════════════════════ */

function CourtRow({court,index,onChange,onRemove,canRemove}) {
  const hrs=t2m(court.endTime)>t2m(court.startTime)
    ?((t2m(court.endTime)-t2m(court.startTime))/60).toFixed(1):null;
  return (
    <div className="slide-in" style={{marginBottom:10,padding:'12px 14px',background:'#0a1a0f',borderRadius:12,border:'1px solid #173d21'}}>
      <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',marginBottom:10}}>
        <span style={{fontFamily:'Bebas Neue',fontSize:20,color:'#a3e635',letterSpacing:2}}>🏟️ สนามที่ {index+1}</span>
        {canRemove&&<button className="btn-red" onClick={()=>onRemove(court.id)}>✕ ลบ</button>}
      </div>
      <div className="court-grid">
        <div className="court-name">
          <label className="lbl">ชื่อสนาม</label>
          <input className="inp" placeholder="เช่น Court A"
            value={court.name} onChange={e=>onChange(court.id,'name',e.target.value)} />
        </div>
        <div>
          <label className="lbl">ราคา (฿/ชม.)</label>
          <input type="number" inputMode="numeric" className="inp" min={0} placeholder="0"
            value={court.price} onChange={e=>onChange(court.id,'price',Number(e.target.value))} />
        </div>
        <div>
          <label className="lbl">เวลาเริ่ม</label>
          <input type="time" className="inp"
            value={court.startTime} onChange={e=>onChange(court.id,'startTime',e.target.value)} />
        </div>
        <div>
          <label className="lbl">เวลาสิ้นสุด</label>
          <input type="time" className="inp"
            value={court.endTime} onChange={e=>onChange(court.id,'endTime',e.target.value)} />
        </div>
      </div>
      {Number(court.price)>0&&hrs&&(
        <p style={{marginTop:8,color:'#86efac',fontSize:12}}>
          ⏱️ {hrs} ชม. × {court.price} ฿ = <strong style={{color:'#a3e635'}}>{(Number(court.price)*Number(hrs)).toLocaleString('th-TH')} บาท</strong>
        </p>
      )}
    </div>
  );
}

function BatchRow({batch,index,startNum,endNum,onChange,onRemove,canRemove}) {
  return (
    <div className="slide-in" style={{marginBottom:10,padding:14,borderRadius:12,border:`1px solid ${BBDR[index%5]}`,background:BBBG[index%5]}}>
      <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',marginBottom:10}}>
        <div style={{display:'flex',alignItems:'center',gap:8}}>
          <span style={{fontSize:18}}>{bIco(index)}</span>
          <span style={{fontFamily:'Bebas Neue',fontSize:20,color:'white',letterSpacing:2}}>ชุดที่ {index+1}</span>
          {Number(batch.count)>0&&startNum<=endNum&&(
            <span style={{fontSize:11,color:'#86efac',background:'rgba(134,239,172,.1)',border:'1px solid rgba(134,239,172,.2)',borderRadius:99,padding:'2px 8px'}}>
              ลูก {startNum}–{endNum}
            </span>
          )}
        </div>
        {canRemove&&<button className="btn-red" onClick={()=>onRemove(batch.id)}>✕ ลบ</button>}
      </div>
      <div className="gb" style={{display:'grid',gridTemplateColumns:'1fr 1fr 1fr',gap:10}}>
        <div>
          <label className="lbl">จำนวนลูก</label>
          <input type="number" inputMode="numeric" className="inp" min={1}
            value={batch.count} onChange={e=>onChange(batch.id,'count',e.target.value)} />
        </div>
        <div>
          <label className="lbl">ราคา/ลูก (฿)</label>
          <input type="number" inputMode="decimal" className="inp" min={0}
            value={batch.price} onChange={e=>onChange(batch.id,'price',e.target.value)} />
        </div>
        <div className="span2">
          <label className="lbl">หมายเหตุ</label>
          <input type="text" className="inp" placeholder="เช่น ของดิฟ..."
            value={batch.label} onChange={e=>onChange(batch.id,'label',e.target.value)} />
        </div>
      </div>
      {Number(batch.count)>0&&Number(batch.price)>0&&(
        <p style={{marginTop:8,color:'#86efac',fontSize:13}}>
          รวมชุดนี้: <strong style={{color:'#a3e635'}}>{(Number(batch.count)*Number(batch.price)).toLocaleString('th-TH')} บาท</strong>
        </p>
      )}
    </div>
  );
}

function ShuttleMap({batches}) {
  const shuttles=buildShuttleList(batches);
  if(!shuttles.length) return null;
  return (
    <div style={{marginTop:14}}>
      <p className="lbl" style={{marginBottom:7}}>แผนผังลำดับลูก</p>
      <div style={{display:'flex',flexWrap:'wrap',gap:4,marginBottom:8}}>
        {shuttles.map(({shuttleNo,batchIdx})=>(
          <span key={shuttleNo} className={`batch-tag ${bCls(batchIdx)}`}>{shuttleNo}</span>
        ))}
      </div>
      <div style={{display:'flex',flexWrap:'wrap',gap:6}}>
        {batches.map((b,i)=>{
          const mine=shuttles.filter(s=>s.batchIdx===i);
          if(!mine.length) return null;
          return(
            <span key={b.id} className={`batch-tag ${bCls(i)}`} style={{fontSize:12,padding:'4px 10px'}}>
              {bIco(i)} ชุด{i+1}: ลูก {mine[0].shuttleNo}–{mine[mine.length-1].shuttleNo} · {b.price}฿{b.label?` · ${b.label}`:''}
            </span>
          );
        })}
      </div>
    </div>
  );
}

function PlayerRow({player,index,courts,totalShuttles,batches,onChange,onRemove}) {
  const shuttles=buildShuttleList(batches);
  const bOf=n=>shuttles.find(s=>s.shuttleNo===Number(n))?.batchIdx??0;
  const sb=bOf(player.shuttleStart),eb=bOf(player.shuttleEnd);
  return (
    <div className="slide-in card" style={{marginBottom:12,border:'1px solid #1f5229'}}>
      <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',marginBottom:10}}>
        <span style={{fontFamily:'Bebas Neue',fontSize:22,color:'#a3e635',letterSpacing:2}}>#{String(index+1).padStart(2,'0')}</span>
        <button className="btn-red" onClick={()=>onRemove(player.id)}>✕ ลบ</button>
      </div>
      <div className="gp" style={{display:'grid',gridTemplateColumns:'1fr 1fr 1fr',gap:10}}>
        <div className="pn">
          <label className="lbl">ชื่อผู้เล่น</label>
          <input type="text" className="inp" placeholder="ชื่อ..."
            autoCapitalize="words" autoCorrect="off"
            value={player.name} onChange={e=>onChange(player.id,'name',e.target.value)} />
        </div>
        <div>
          <label className="lbl">เวลาเริ่ม</label>
          <input type="time" className="inp"
            value={player.startTime} onChange={e=>onChange(player.id,'startTime',e.target.value)} />
        </div>
        <div>
          <label className="lbl">เวลาหยุด</label>
          <input type="time" className="inp"
            value={player.endTime} onChange={e=>onChange(player.id,'endTime',e.target.value)} />
        </div>
        <div>
          <label className="lbl">ลูกที่เริ่มใช้</label>
          <input type="number" inputMode="numeric" className="inp" min={1} max={totalShuttles||99}
            value={player.shuttleStart} onChange={e=>onChange(player.id,'shuttleStart',Number(e.target.value))} />
          {totalShuttles>0&&<span className={`batch-tag ${bCls(sb)}`} style={{marginTop:5}}>{bIco(sb)} ชุด {sb+1}</span>}
        </div>
        <div>
          <label className="lbl">ลูกสุดท้าย</label>
          <input type="number" inputMode="numeric" className="inp" min={1} max={totalShuttles||99}
            value={player.shuttleEnd} onChange={e=>onChange(player.id,'shuttleEnd',Number(e.target.value))} />
          {totalShuttles>0&&<span className={`batch-tag ${bCls(eb)}`} style={{marginTop:5}}>{bIco(eb)} ชุด {eb+1}</span>}
        </div>
      </div>
    </div>
  );
}

function ResultsTable({data,round,courts,batches}) {
  if(!data) return null;
  const{results,totalCourt,totalShuttle,grandTotal}=data;
  const multiBatch=batches.length>1;
  const shuttles=buildShuttleList(batches);
  return (
    <div className="fade-in">
      <div className="g3" style={{display:'grid',gridTemplateColumns:'1fr 1fr 1fr',gap:10,marginBottom:18}}>
        {[{lbl:'ค่าสนามรวม',v:totalCourt,a:false},{lbl:'ค่าลูกรวม',v:totalShuttle,a:false},{lbl:'รวมทั้งหมด',v:grandTotal,a:true}].map(c=>(
          <div key={c.lbl} className="card" style={{textAlign:'center',padding:'12px 8px',
            border:c.a?'1px solid rgba(163,230,53,.45)':'1px solid #1f5229',
            ...(c.a?{boxShadow:'0 0 18px rgba(163,230,53,.12)'}:{})}}>
            <p style={{color:c.a?'#a3e635':'#4ade80',fontSize:10,fontWeight:700,textTransform:'uppercase',letterSpacing:'.07em',marginBottom:4}}>{c.lbl}</p>
            <p style={{color:c.a?'#a3e635':'white',fontFamily:'Bebas Neue',fontSize:24,lineHeight:1}}>{fmt(c.v,round)}</p>
            <p style={{color:c.a?'#65a30d':'#166534',fontSize:11,marginTop:2}}>บาท</p>
          </div>
        ))}
      </div>
      <div style={{display:'flex',flexWrap:'wrap',gap:6,marginBottom:12}}>
        {courts.map(c=>(
          <span key={c.id} style={{background:'#0f2a17',border:'1px solid #1f5229',color:'#86efac',borderRadius:99,padding:'4px 11px',fontSize:12}}>
            🏟️ {c.name} · {c.price}฿/ชม. · {c.startTime}–{c.endTime}
          </span>
        ))}
        <span style={{background:'rgba(163,230,53,.08)',border:'1px solid rgba(163,230,53,.3)',color:'#a3e635',borderRadius:99,padding:'4px 11px',fontSize:12,fontWeight:700}}>
          🏸 {data.totalShuttlesUsed} ลูก · ฿{fmt(totalShuttle,round)}
        </span>
      </div>
      {multiBatch&&(
        <div style={{display:'flex',flexWrap:'wrap',gap:6,marginBottom:12}}>
          {batches.map((b,i)=>{
            const mine=shuttles.filter(s=>s.batchIdx===i);
            if(!mine.length) return null;
            const bT=results.reduce((s,r)=>s+(r.batchCosts[i]||0),0);
            return(
              <span key={b.id} className={`batch-tag ${bCls(i)}`} style={{fontSize:12,padding:'5px 11px'}}>
                {bIco(i)} ชุด{i+1} (ลูก {mine[0].shuttleNo}–{mine[mine.length-1].shuttleNo} · {b.price}฿) → ฿{fmt(bT,round)}
              </span>
            );
          })}
        </div>
      )}
      <div className="scroll-x" style={{borderRadius:12,border:'1px solid #173d21'}}>
        <table className="rtable">
          <thead>
            <tr>
              <th style={{textAlign:'left'}}>ชื่อ</th>
              <th>เวลา</th><th>ลูก</th><th>ค่าสนาม</th>
              {multiBatch?batches.map((b,i)=>{const m=shuttles.filter(s=>s.batchIdx===i);if(!m.length)return null;return<th key={b.id}>{bIco(i)}ชุด{i+1}<br/><span style={{fontSize:9}}>{m[0].shuttleNo}–{m[m.length-1].shuttleNo}</span></th>;}): <th>ค่าลูก</th>}
              <th style={{color:'#a3e635'}}>รวม</th>
            </tr>
          </thead>
          <tbody>
            {results.map(r=>(
              <tr key={r.id}>
                <td>{r.name}</td>
                <td style={{fontSize:11,color:'#86efac'}}>{r.startTime}–{r.endTime}</td>
                <td style={{fontSize:11,color:'#86efac'}}>{r.shuttleStart}–{r.shuttleEnd}</td>
                <td>{fmt(r.courtCost,round)}</td>
                {multiBatch?batches.map((b,i)=>{const m=shuttles.filter(s=>s.batchIdx===i);if(!m.length)return null;return<td key={b.id}>{fmt(r.batchCosts[i]||0,round)}</td>;}): <td>{fmt(r.shuttleCost,round)}</td>}
                <td className="lime-col">฿{fmt(r.total,round)}</td>
              </tr>
            ))}
          </tbody>
          <tfoot>
            <tr>
              <td colSpan={3} style={{textAlign:'left',color:'#4ade80',fontSize:10,textTransform:'uppercase',letterSpacing:'.06em'}}>รวมทั้งหมด</td>
              <td>{fmt(totalCourt,round)}</td>
              {multiBatch?batches.map((b,i)=>{const m=shuttles.filter(s=>s.batchIdx===i);if(!m.length)return null;return<td key={b.id}>{fmt(results.reduce((s,r)=>s+(r.batchCosts[i]||0),0),round)}</td>;}): <td>{fmt(totalShuttle,round)}</td>}
              <td className="lime-col" style={{fontSize:15}}>฿{fmt(grandTotal,round)}</td>
            </tr>
          </tfoot>
        </table>
      </div>
    </div>
  );
}

/* ══════════════════════════════════════════
   MAIN APP
══════════════════════════════════════════ */
function App() {
  const saved=useMemo(()=>loadSaved(),[]);

  // migrate: ถ้า saved มี courts แต่ไม่มี startTime ให้เพิ่มให้อัตโนมัติ
  const initCourts=useMemo(()=>{
    if(!saved) return DEFAULT_COURTS;
    const c=saved.courts||DEFAULT_COURTS;
    return c.map(ct=>({...ct,
      startTime:ct.startTime||saved.settings?.sessionStart||'18:00',
      endTime:  ct.endTime  ||saved.settings?.sessionEnd  ||'21:00',
    }));
  },[]);

  const [courts,  setCourts]  = useState(initCourts);
  const [batches, setBatches] = useState(saved?.batches ||DEFAULT_BATCHES);
  const [players, setPlayers] = useState(saved?.players ||DEFAULT_PLAYERS);
  const [round,   setRound]   = useState(saved?.round   ||false);
  const [errors,  setErrors]  = useState([]);
  const [result,  setResult]  = useState(null);
  const [loading, setLoading] = useState(false);
  const [saveStatus,setSaveStatus] = useState('saved');
  const [toast,   setToast]   = useState(null);
  const resultRef=useRef(null);
  const saveTimer=useRef(null);

  useEffect(()=>{
    setSaveStatus('saving');
    clearTimeout(saveTimer.current);
    saveTimer.current=setTimeout(()=>{ saveTo({courts,batches,players,round}); setSaveStatus('saved'); },600);
    return()=>clearTimeout(saveTimer.current);
  },[courts,batches,players,round]);

  useEffect(()=>{
    const errs=validate(courts,players,batches);
    setErrors(errs);
    setResult(errs.length===0&&players.length>0?calculate(courts,players,batches):null);
  },[courts,players,batches]);

  const showToast=useCallback(msg=>{setToast(msg);setTimeout(()=>setToast(null),2500);},[]);
  const updC=useCallback((id,k,v)=>setCourts(p=>p.map(c=>c.id===id?{...c,[k]:v}:c)),[]);
  const updB=useCallback((id,k,v)=>setBatches(p=>p.map(b=>b.id===id?{...b,[k]:v}:b)),[]);
  const updP=useCallback((id,k,v)=>setPlayers(p=>p.map(pl=>pl.id===id?{...pl,[k]:v}:pl)),[]);

  const batchNums=useMemo(()=>{
    let num=1;
    return batches.map(b=>{const s=num,cnt=Math.max(0,Number(b.count)||0);num+=cnt;return{start:s,end:s+cnt-1};});
  },[batches]);

  const totalShuttles=useMemo(()=>buildShuttleList(batches).length,[batches]);

  const loadExample=()=>{const ex=makeExample();setCourts(ex.courts);setBatches(ex.batches);setPlayers(ex.players);showToast('โหลดข้อมูลตัวอย่างแล้ว ✅');};
  const clearAll=()=>{
    if(!window.confirm('ล้างข้อมูลทั้งหมด?')) return;
    localStorage.removeItem(STORAGE_KEY);
    setCourts(DEFAULT_COURTS);setBatches([makeBatch()]);setPlayers([makePlayer()]);
    showToast('ล้างข้อมูลแล้ว 🗑️');
  };

  const handleExport=async()=>{
    if(!resultRef.current) return;
    setLoading(true);
    try{
      await new Promise(r=>setTimeout(r,80));
      const canvas=await exportSharpImage(resultRef.current);
      const link=document.createElement('a');
      link.download=`badminton-split-${new Date().toLocaleDateString('th-TH').replace(/\//g,'-')}.png`;
      link.href=canvas.toDataURL('image/png',1.0);link.click();
      showToast('Export สำเร็จ! 📸');
    }catch(e){alert('Export ล้มเหลว: '+e.message);}
    finally{setLoading(false);}
  };

  const copyText=async()=>{
    if(!result) return;
    const{results,totalCourt,totalShuttle,grandTotal}=result;
    const courtList=courts.map(c=>`${c.name} ${c.price}฿/ชม. (${c.startTime}–${c.endTime})`).join(', ');
    const lines=[`🏸 Badminton Split`,`🏟️ ${courtList}`,'─'.repeat(44),
      ...results.map(r=>`${r.name.padEnd(6)} สนาม:${fmt(r.courtCost,round).padStart(8)} | ลูก:${fmt(r.shuttleCost,round).padStart(8)} | รวม: ฿${fmt(r.total,round)}`),
      '─'.repeat(44),`ค่าสนามรวม : ฿${fmt(totalCourt,round)}`,`ค่าลูกรวม  : ฿${fmt(totalShuttle,round)}`,`รวมทั้งหมด : ฿${fmt(grandTotal,round)}`,
    ];
    try{await navigator.clipboard.writeText(lines.join('\n'));showToast('คัดลอกแล้ว! 📋');}
    catch{alert('ไม่สามารถคัดลอกได้');}
  };

  const H2={fontFamily:'Bebas Neue',fontSize:26,color:'#a3e635',letterSpacing:4,margin:0};

  return (
    <div style={{minHeight:'100vh',background:'#0a1a0f'}}>
      {loading&&<div className="overlay"><div className="spinner"/><p style={{color:'#a3e635',fontFamily:'Bebas Neue',fontSize:22,letterSpacing:3}}>กำลัง Export...</p></div>}
      {toast&&<div className="toast">{toast}</div>}

      <header className="safe-top" style={{position:'relative',overflow:'hidden',background:'#050e07',borderBottom:'1px solid #173d21',padding:'20px 16px'}}>
        <div style={{position:'absolute',inset:0,opacity:.05,pointerEvents:'none'}}>
          <div style={{position:'absolute',top:0,left:'50%',transform:'translateX(-50%)',width:1,height:'100%',background:'#a3e635'}}/>
          <div style={{position:'absolute',top:'50%',left:0,width:'100%',height:1,background:'#a3e635'}}/>
        </div>
        <div style={{maxWidth:820,margin:'0 auto',position:'relative'}}>
          <div style={{display:'flex',alignItems:'center',justifyContent:'space-between'}}>
            <div>
              <h1 style={{fontFamily:'Bebas Neue',fontSize:'clamp(28px,8vw,50px)',color:'white',letterSpacing:6,lineHeight:1,margin:0}}>
                BADMINTON<span style={{color:'#a3e635'}}>.</span>SPLIT
              </h1>
              <p style={{color:'#22c55e',fontSize:13,marginTop:4,fontWeight:500}}>คำนวณค่าใช้จ่ายยุติธรรม · รองรับหลายสนาม-หลายเวลา</p>
            </div>
            <span style={{fontSize:40,opacity:.85}}>🏸</span>
          </div>
          <div style={{marginTop:10}}>
            <span className={`save-dot ${saveStatus==='saving'?'saving':''}`}>
              <span className="dot"/>
              {saveStatus==='saving'?'กำลังบันทึก...':'บันทึกอัตโนมัติแล้ว'}
            </span>
          </div>
        </div>
      </header>

      <main className="safe-bottom" style={{maxWidth:820,margin:'0 auto',padding:'18px 16px'}}>
        <div style={{display:'flex',flexWrap:'wrap',gap:8,marginBottom:18}}>
          <button className="btn-ghost" onClick={loadExample}>🧪 โหลดตัวอย่าง</button>
          <button className="btn-ghost" onClick={clearAll}>🗑️ ล้างข้อมูล</button>
        </div>

        {/* COURTS */}
        <section className="card" style={{marginBottom:14,border:'1px solid #1f5229'}}>
          <div style={{display:'flex',alignItems:'flex-start',justifyContent:'space-between',marginBottom:14,gap:10}}>
            <div>
              <h2 style={H2}>COURTS <span style={{color:'#166534',fontSize:20}}>({courts.length})</span></h2>
              <p style={{color:'#4ade80',fontSize:12,marginTop:4}}>แต่ละสนามมีเวลาเริ่ม-สิ้นสุดของตัวเอง · คิดตามช่วงที่สนามเปิด</p>
            </div>
            <button className="btn-lime" onClick={()=>setCourts(p=>[...p,makeCourt()])}>+ เพิ่มสนาม</button>
          </div>
          {courts.length===0?(
            <div style={{textAlign:'center',padding:'24px',border:'1px dashed #1f5229',borderRadius:10,color:'#166534'}}>
              <p style={{fontSize:28,marginBottom:6}}>🏟️</p>
              <p style={{fontWeight:600,fontSize:13}}>ยังไม่มีสนาม กด "เพิ่มสนาม" เพื่อเริ่ม</p>
            </div>
          ):(
            courts.map((c,i)=>(
              <CourtRow key={c.id} court={c} index={i}
                onChange={updC} onRemove={id=>setCourts(p=>p.filter(x=>x.id!==id))}
                canRemove={courts.length>1}/>
            ))
          )}
        </section>

        {/* SHUTTLECOCK */}
        <section className="card" style={{marginBottom:14,border:'1px solid #1f5229'}}>
          <div style={{display:'flex',alignItems:'flex-start',justifyContent:'space-between',marginBottom:14,gap:10}}>
            <div>
              <h2 style={H2}>SHUTTLECOCK</h2>
              <p style={{color:'#4ade80',fontSize:12,marginTop:4}}>เพิ่มหลายชุดได้ · ราคาต่างกันได้</p>
            </div>
            <button className="btn-lime" onClick={()=>setBatches(p=>[...p,makeBatch()])}>+ เพิ่มชุดลูก</button>
          </div>
          {batches.map((b,i)=>(
            <BatchRow key={b.id} batch={b} index={i}
              startNum={batchNums[i].start} endNum={batchNums[i].end}
              onChange={updB} onRemove={id=>setBatches(p=>p.filter(x=>x.id!==id))}
              canRemove={batches.length>1}/>
          ))}
          <ShuttleMap batches={batches}/>
          {totalShuttles>0&&(
            <div style={{marginTop:12,padding:'10px 14px',background:'rgba(163,230,53,.06)',border:'1px solid rgba(163,230,53,.2)',borderRadius:8}}>
              <p style={{color:'#a3e635',fontSize:13,fontWeight:700}}>
                🏸 รวมลูกทั้งหมด: {totalShuttles} ลูก &nbsp;·&nbsp; ค่าลูกรวม: {batches.reduce((s,b)=>s+Number(b.count)*Number(b.price),0).toLocaleString('th-TH')} บาท
              </p>
            </div>
          )}
        </section>

        {/* PLAYERS */}
        <section style={{marginBottom:14}}>
          <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',marginBottom:10}}>
            <h2 style={H2}>PLAYERS <span style={{color:'#166534',fontSize:20}}>({players.length})</span></h2>
            <button className="btn-lime" onClick={()=>{
              const gS=courts.length>0?courts.map(c=>c.startTime).sort()[0]:'18:00';
              setPlayers(p=>[...p,makePlayer(gS)]);
            }}>+ เพิ่มผู้เล่น</button>
          </div>
          {players.length===0&&(
            <div className="card" style={{textAlign:'center',padding:'32px 20px',borderStyle:'dashed',borderColor:'#1f5229',color:'#166534'}}>
              <p style={{fontSize:32,marginBottom:8}}>👤</p>
              <p style={{fontWeight:600}}>ยังไม่มีผู้เล่น กด "เพิ่มผู้เล่น" เพื่อเริ่ม</p>
            </div>
          )}
          {players.map((p,i)=>(
            <PlayerRow key={p.id} player={p} index={i}
              courts={courts} totalShuttles={totalShuttles} batches={batches}
              onChange={updP} onRemove={id=>setPlayers(p=>p.filter(x=>x.id!==id))}/>
          ))}
        </section>

        {/* ERRORS */}
        {errors.length>0&&(
          <div className="card" style={{marginBottom:14,background:'rgba(220,38,38,.07)',border:'1px solid rgba(220,38,38,.3)'}}>
            <p style={{color:'#f87171',fontWeight:700,fontSize:14,marginBottom:8}}>ตรวจพบข้อผิดพลาด:</p>
            {errors.map((e,i)=><p key={i} style={{color:'#fca5a5',fontSize:13,marginBottom:4}}>{e}</p>)}
          </div>
        )}

        {/* RESULTS */}
        {result&&(
          <section>
            <div className="action-bar" style={{display:'flex',alignItems:'center',justifyContent:'space-between',gap:8,marginBottom:12}}>
              <h2 style={H2}>RESULTS</h2>
              <div style={{display:'flex',flexWrap:'wrap',gap:8}}>
                <button className="btn-toggle" onClick={()=>setRound(r=>!r)}
                  style={{background:round?'#a3e635':'#0f2a17',color:round?'#050e07':'#4ade80',border:round?'1px solid #a3e635':'1px solid #173d21'}}>
                  {round?'✓ ปัดเศษ':'⊙ ปัดเศษ'}
                </button>
                <button className="btn-ghost" onClick={copyText}>📋 คัดลอก</button>
                <button className="btn-ghost" onClick={handleExport} style={{background:'#132a13',borderColor:'#1f5229'}}>📸 Export</button>
              </div>
            </div>
            <div ref={resultRef} className="card export-snapshot" style={{border:'1px solid #1f5229',padding:'18px 18px 22px'}}>
              <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',marginBottom:18,paddingBottom:14,borderBottom:'1px solid #173d21'}}>
                <div>
                  <p style={{fontFamily:'Bebas Neue',fontSize:22,color:'white',letterSpacing:4,margin:0}}>BADMINTON<span style={{color:'#a3e635'}}>.</span>SPLIT</p>
                  <p style={{color:'#4ade80',fontSize:12,margin:'2px 0 0'}}>สรุปค่าใช้จ่าย — {new Date().toLocaleDateString('th-TH',{year:'numeric',month:'long',day:'numeric'})}</p>
                </div>
                <span style={{fontSize:28}}>🏸</span>
              </div>
              <ResultsTable data={result} round={round} courts={courts} batches={batches}/>
            </div>
          </section>
        )}

        {!result&&errors.length===0&&players.length>0&&(
          <div className="card" style={{textAlign:'center',padding:'28px',borderStyle:'dashed',borderColor:'#1f5229',color:'#166534'}}>
            <p style={{fontSize:14}}>กรอกข้อมูลให้ครบเพื่อดูผลลัพธ์อัตโนมัติ ✨</p>
          </div>
        )}
      </main>

      <footer style={{maxWidth:820,margin:'24px auto 0',padding:'0 16px 32px',textAlign:'center',color:'#1f5229',fontSize:12}}>
        คำนวณตามเวลาจริงและลูกแบดที่ใช้จริง · ยุติธรรมกับทุกคน 🏸
      </footer>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
