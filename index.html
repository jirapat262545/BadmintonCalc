<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Badminton Split 🏸</title>

  <!-- Tailwind CSS CDN -->
  <script src="https://cdn.tailwindcss.com"></script>

  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet" />

  <!-- React + ReactDOM + Babel (for JSX in browser) -->
  <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

  <!-- html2canvas for export -->
  <script src="https://unpkg.com/html2canvas@1.4.1/dist/html2canvas.min.js"></script>

  <script>
    tailwind.config = {
      theme: {
        extend: {
          fontFamily: {
            display: ['"Bebas Neue"', 'cursive'],
            body: ['"Plus Jakarta Sans"', 'sans-serif'],
          },
        },
      },
    }
  </script>

  <style>
    * { box-sizing: border-box; }
    body {
      background-color: #0a1a0f;
      font-family: 'Plus Jakarta Sans', sans-serif;
      -webkit-font-smoothing: antialiased;
    }
    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-track { background: #0a1a0f; }
    ::-webkit-scrollbar-thumb { background: #1f5229; border-radius: 3px; }
    ::-webkit-scrollbar-thumb:hover { background: #a3e635; }

    .input-field {
      width: 100%;
      background: #0f2a17;
      border: 1px solid #173d21;
      border-radius: 8px;
      padding: 8px 12px;
      color: white;
      font-size: 14px;
      font-family: 'Plus Jakarta Sans', sans-serif;
      outline: none;
      transition: border-color 0.2s, box-shadow 0.2s;
    }
    .input-field::placeholder { color: #1f5229; }
    .input-field:focus {
      border-color: #a3e635;
      box-shadow: 0 0 0 2px rgba(163, 230, 53, 0.15);
    }
    .input-label {
      display: block;
      font-size: 11px;
      font-weight: 600;
      color: #4ade80;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      margin-bottom: 4px;
    }
    .card {
      background: #0f2a17;
      border: 1px solid #173d21;
      border-radius: 12px;
      padding: 20px;
    }
    .btn-primary {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      background: #a3e635;
      color: #050e07;
      font-weight: 700;
      font-size: 14px;
      padding: 8px 16px;
      border-radius: 8px;
      border: none;
      cursor: pointer;
      transition: background 0.15s, transform 0.1s;
      font-family: 'Plus Jakarta Sans', sans-serif;
    }
    .btn-primary:hover { background: #bef264; }
    .btn-primary:active { transform: scale(0.96); }
    .btn-ghost {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      background: #0f2a17;
      color: #86efac;
      font-weight: 600;
      font-size: 13px;
      padding: 7px 14px;
      border-radius: 8px;
      border: 1px solid #173d21;
      cursor: pointer;
      transition: all 0.15s;
      font-family: 'Plus Jakarta Sans', sans-serif;
    }
    .btn-ghost:hover { border-color: #a3e635; color: #a3e635; }
    .btn-round {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      font-weight: 700;
      font-size: 12px;
      padding: 7px 14px;
      border-radius: 8px;
      border: none;
      cursor: pointer;
      transition: all 0.15s;
      font-family: 'Plus Jakarta Sans', sans-serif;
    }
    @keyframes slideIn {
      from { opacity: 0; transform: translateY(-8px); }
      to { opacity: 1; transform: translateY(0); }
    }
    .slide-in { animation: slideIn 0.2s ease-out; }
    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }
    .fade-in { animation: fadeIn 0.35s ease-out; }

    /* number input arrows */
    input[type=number]::-webkit-inner-spin-button,
    input[type=number]::-webkit-outer-spin-button {
      opacity: 0.4;
      filter: invert(1);
    }

    /* time input */
    input[type=time]::-webkit-calendar-picker-indicator {
      filter: invert(0.6) sepia(1) hue-rotate(80deg);
      cursor: pointer;
    }

    .lime-glow { box-shadow: 0 0 20px rgba(163,230,53,0.15); }

    /* Table */
    .result-table { width: 100%; border-collapse: collapse; font-size: 14px; }
    .result-table th {
      background: #173d21;
      color: #4ade80;
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      padding: 10px 14px;
      text-align: right;
      font-weight: 600;
    }
    .result-table th:first-child { text-align: left; }
    .result-table td { padding: 10px 14px; text-align: right; color: #bbf7d0; border-top: 1px solid #173d21; }
    .result-table td:first-child { text-align: left; color: white; font-weight: 600; }
    .result-table tr:nth-child(odd) td { background: rgba(5,14,7,0.4); }
    .result-table tr:hover td { background: rgba(23,61,33,0.5); }
    .result-table tfoot td {
      background: #173d21;
      font-weight: 700;
      color: white;
      border-top: 2px solid rgba(163,230,53,0.3);
    }
    .result-table .total-col { color: #a3e635; font-weight: 800; }

    /* Responsive grid helpers */
    .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
    .grid-3 { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 12px; }
    .grid-settings { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 12px; }
    @media (max-width: 600px) {
      .grid-3 { grid-template-columns: 1fr 1fr; }
      .grid-settings { grid-template-columns: 1fr 1fr; }
      .grid-settings .span-all { grid-column: span 2; }
      .result-table { font-size: 12px; }
      .result-table th, .result-table td { padding: 8px 8px; }
    }

    /* Player row */
    .player-grid {
      display: grid;
      grid-template-columns: 1fr 1fr 1fr;
      gap: 10px;
    }
    .player-name-col { grid-column: span 1; }
    @media (max-width: 520px) {
      .player-grid { grid-template-columns: 1fr 1fr; }
      .player-name-col { grid-column: span 2; }
    }
  </style>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel">
    const { useState, useEffect, useRef, useCallback } = React;

    // ─────────────────────────────────────────────
    // UTILS
    // ─────────────────────────────────────────────
    const timeToMinutes = (t) => {
      if (!t || !t.includes(':')) return 0;
      const [h, m] = t.split(':').map(Number);
      return h * 60 + m;
    };

    const fmt = (n, round) => {
      if (round) return Math.round(n).toLocaleString('th-TH');
      const fixed = parseFloat(n.toFixed(2));
      return fixed.toLocaleString('th-TH', { minimumFractionDigits: 0, maximumFractionDigits: 2 });
    };

    const uid = () => Math.random().toString(36).slice(2, 9);

    // ─────────────────────────────────────────────
    // CALCULATION ENGINE
    // ─────────────────────────────────────────────
    function calculate(settings, players) {
      const { courtPricePerHour, sessionStart, sessionEnd, shuttleCount, shuttlePrice } = settings;
      const sessionStartMin = timeToMinutes(sessionStart);
      const sessionEndMin = timeToMinutes(sessionEnd);

      if (sessionEndMin <= sessionStartMin) return null;
      if (players.length === 0) return null;

      // Build hourly slots
      const slots = [];
      for (let t = sessionStartMin; t < sessionEndMin; t += 60) {
        slots.push({ start: t, end: Math.min(t + 60, sessionEndMin) });
      }

      // Court cost
      const courtCosts = {};
      players.forEach(p => (courtCosts[p.id] = 0));
      slots.forEach(slot => {
        const fraction = (slot.end - slot.start) / 60;
        const inSlot = players.filter(p => {
          const ps = timeToMinutes(p.startTime);
          const pe = timeToMinutes(p.endTime);
          return ps < slot.end && pe > slot.start;
        });
        if (!inSlot.length) return;
        const cpp = (courtPricePerHour * fraction) / inSlot.length;
        inSlot.forEach(p => (courtCosts[p.id] += cpp));
      });

      // Shuttle cost
      const shuttleCosts = {};
      players.forEach(p => (shuttleCosts[p.id] = 0));
      for (let s = 1; s <= shuttleCount; s++) {
        const using = players.filter(
          p => Number(p.shuttleStart) <= s && Number(p.shuttleEnd) >= s
        );
        if (!using.length) continue;
        const cpp = shuttlePrice / using.length;
        using.forEach(p => (shuttleCosts[p.id] += cpp));
      }

      const results = players.map(p => ({
        id: p.id,
        name: p.name,
        startTime: p.startTime,
        endTime: p.endTime,
        shuttleStart: p.shuttleStart,
        shuttleEnd: p.shuttleEnd,
        courtCost: courtCosts[p.id] || 0,
        shuttleCost: shuttleCosts[p.id] || 0,
        total: (courtCosts[p.id] || 0) + (shuttleCosts[p.id] || 0),
      }));

      const totalCourt = results.reduce((s, r) => s + r.courtCost, 0);
      const totalShuttle = results.reduce((s, r) => s + r.shuttleCost, 0);
      const grandTotal = totalCourt + totalShuttle;

      return { results, totalCourt, totalShuttle, grandTotal };
    }

    // ─────────────────────────────────────────────
    // VALIDATION
    // ─────────────────────────────────────────────
    function validate(settings, players) {
      const errors = [];
      const sStart = timeToMinutes(settings.sessionStart);
      const sEnd = timeToMinutes(settings.sessionEnd);

      if (sEnd <= sStart) errors.push('⚠️ เวลาสิ้นสุดต้องมากกว่าเวลาเริ่มเล่น');
      if (Number(settings.courtPricePerHour) <= 0) errors.push('⚠️ ค่าสนามต้องมากกว่า 0');
      if (Number(settings.shuttleCount) < 1) errors.push('⚠️ จำนวนลูกแบดต้องอย่างน้อย 1 ลูก');
      if (Number(settings.shuttlePrice) <= 0) errors.push('⚠️ ราคาลูกแบดต้องมากกว่า 0');

      players.forEach((p, i) => {
        const label = p.name || `ผู้เล่นคนที่ ${i + 1}`;
        const ps = timeToMinutes(p.startTime);
        const pe = timeToMinutes(p.endTime);
        if (!p.name.trim()) errors.push(`⚠️ [${label}] กรุณากรอกชื่อ`);
        if (pe <= ps) errors.push(`⚠️ [${label}] เวลาหยุดต้องมากกว่าเวลาเริ่ม`);
        if (ps < sStart || pe > sEnd)
          errors.push(`⚠️ [${label}] เวลาเล่นต้องอยู่ในช่วง ${settings.sessionStart}–${settings.sessionEnd}`);
        if (Number(p.shuttleStart) > Number(p.shuttleEnd))
          errors.push(`⚠️ [${label}] ลูกเริ่มต้องน้อยกว่าหรือเท่ากับลูกสุดท้าย`);
        if (Number(p.shuttleEnd) > Number(settings.shuttleCount))
          errors.push(`⚠️ [${label}] ลูกสุดท้ายเกินจำนวนลูกทั้งหมด (${settings.shuttleCount})`);
      });

      return errors;
    }

    // ─────────────────────────────────────────────
    // EXAMPLE DATA
    // ─────────────────────────────────────────────
    const makeExample = () => ({
      settings: {
        courtPricePerHour: 140,
        sessionStart: '18:00',
        sessionEnd: '21:00',
        shuttleCount: 7,
        shuttlePrice: 80,
      },
      players: [
        { id: uid(), name: 'ดิฟ',  startTime:'18:00', endTime:'19:00', shuttleStart:1, shuttleEnd:4 },
        { id: uid(), name: 'นาย',  startTime:'18:00', endTime:'19:00', shuttleStart:1, shuttleEnd:4 },
        { id: uid(), name: 'เอิท', startTime:'18:00', endTime:'21:00', shuttleStart:2, shuttleEnd:7 },
        { id: uid(), name: 'ดรอย', startTime:'18:00', endTime:'21:00', shuttleStart:1, shuttleEnd:7 },
        { id: uid(), name: 'มาชร์',startTime:'18:00', endTime:'21:00', shuttleStart:1, shuttleEnd:7 },
        { id: uid(), name: 'ปริ้น',startTime:'18:00', endTime:'21:00', shuttleStart:1, shuttleEnd:7 },
        { id: uid(), name: 'บิว',  startTime:'18:00', endTime:'21:00', shuttleStart:2, shuttleEnd:7 },
        { id: uid(), name: 'ปิ่น', startTime:'19:00', endTime:'21:00', shuttleStart:3, shuttleEnd:7 },
      ],
    });

    const makePlayer = (sessionStart = '18:00') => ({
      id: uid(), name: '', startTime: sessionStart, endTime: '', shuttleStart: 1, shuttleEnd: 1,
    });

    // ─────────────────────────────────────────────
    // PLAYER ROW
    // ─────────────────────────────────────────────
    function PlayerRow({ player, index, settings, onChange, onRemove }) {
      return (
        <div className="slide-in card" style={{ marginBottom: 12, border: '1px solid #1f5229' }}>
          <div style={{ display:'flex', alignItems:'center', justifyContent:'space-between', marginBottom:10 }}>
            <span style={{ fontFamily:'Bebas Neue', fontSize:22, color:'#a3e635', letterSpacing:2 }}>
              #{String(index + 1).padStart(2,'0')}
            </span>
            <button
              onClick={() => onRemove(player.id)}
              style={{
                background:'rgba(220,38,38,0.1)', border:'1px solid rgba(220,38,38,0.3)',
                color:'#f87171', borderRadius:8, padding:'4px 10px', cursor:'pointer',
                fontSize:12, fontWeight:700, fontFamily:'Plus Jakarta Sans, sans-serif'
              }}
            >✕ ลบ</button>
          </div>

          <div className="player-grid">
            <div className="player-name-col">
              <label className="input-label">ชื่อผู้เล่น</label>
              <input className="input-field" placeholder="ชื่อ..."
                value={player.name}
                onChange={e => onChange(player.id, 'name', e.target.value)} />
            </div>
            <div>
              <label className="input-label">เวลาเริ่ม</label>
              <input type="time" className="input-field"
                value={player.startTime}
                onChange={e => onChange(player.id, 'startTime', e.target.value)} />
            </div>
            <div>
              <label className="input-label">เวลาหยุด</label>
              <input type="time" className="input-field"
                value={player.endTime}
                onChange={e => onChange(player.id, 'endTime', e.target.value)} />
            </div>
            <div>
              <label className="input-label">ลูกที่เริ่มใช้</label>
              <input type="number" className="input-field"
                min={1} max={settings.shuttleCount}
                value={player.shuttleStart}
                onChange={e => onChange(player.id, 'shuttleStart', Number(e.target.value))} />
            </div>
            <div>
              <label className="input-label">ลูกสุดท้าย</label>
              <input type="number" className="input-field"
                min={1} max={settings.shuttleCount}
                value={player.shuttleEnd}
                onChange={e => onChange(player.id, 'shuttleEnd', Number(e.target.value))} />
            </div>
          </div>
        </div>
      );
    }

    // ─────────────────────────────────────────────
    // RESULTS TABLE
    // ─────────────────────────────────────────────
    function ResultsTable({ data, round, settings }) {
      if (!data) return null;
      const { results, totalCourt, totalShuttle, grandTotal } = data;

      return (
        <div className="fade-in">
          {/* Summary cards */}
          <div className="grid-3" style={{ marginBottom: 20 }}>
            <div className="card" style={{ textAlign:'center', border:'1px solid #1f5229' }}>
              <p style={{ color:'#4ade80', fontSize:11, fontWeight:600, textTransform:'uppercase', letterSpacing:'0.07em', marginBottom:4 }}>ค่าสนามรวม</p>
              <p style={{ color:'white', fontFamily:'Bebas Neue', fontSize:26 }}>{fmt(totalCourt, round)}</p>
              <p style={{ color:'#166534', fontSize:11 }}>บาท</p>
            </div>
            <div className="card" style={{ textAlign:'center', border:'1px solid #1f5229' }}>
              <p style={{ color:'#4ade80', fontSize:11, fontWeight:600, textTransform:'uppercase', letterSpacing:'0.07em', marginBottom:4 }}>ค่าลูกรวม</p>
              <p style={{ color:'white', fontFamily:'Bebas Neue', fontSize:26 }}>{fmt(totalShuttle, round)}</p>
              <p style={{ color:'#166534', fontSize:11 }}>บาท</p>
            </div>
            <div className="card lime-glow" style={{ textAlign:'center', border:'1px solid rgba(163,230,53,0.4)' }}>
              <p style={{ color:'#a3e635', fontSize:11, fontWeight:600, textTransform:'uppercase', letterSpacing:'0.07em', marginBottom:4 }}>รวมทั้งหมด</p>
              <p style={{ color:'#a3e635', fontFamily:'Bebas Neue', fontSize:26 }}>{fmt(grandTotal, round)}</p>
              <p style={{ color:'#65a30d', fontSize:11 }}>บาท</p>
            </div>
          </div>

          {/* Session tags */}
          <div style={{ display:'flex', flexWrap:'wrap', gap:8, marginBottom:16 }}>
            {[
              `🕐 ${settings.sessionStart} – ${settings.sessionEnd}`,
              `🏟️ ${settings.courtPricePerHour} บาท/ชม.`,
              `🏸 ${settings.shuttleCount} ลูก × ${settings.shuttlePrice} บาท`,
            ].map(tag => (
              <span key={tag} style={{
                background:'#0f2a17', border:'1px solid #1f5229',
                color:'#86efac', borderRadius:999, padding:'4px 12px', fontSize:12
              }}>{tag}</span>
            ))}
          </div>

          {/* Table */}
          <div style={{ overflowX:'auto', borderRadius:12, border:'1px solid #173d21' }}>
            <table className="result-table">
              <thead>
                <tr>
                  <th style={{ textAlign:'left' }}>ชื่อ</th>
                  <th>ช่วงเวลา</th>
                  <th>ลูกที่ใช้</th>
                  <th>ค่าสนาม</th>
                  <th>ค่าลูก</th>
                  <th style={{ color:'#a3e635' }}>รวม (฿)</th>
                </tr>
              </thead>
              <tbody>
                {results.map(r => (
                  <tr key={r.id}>
                    <td>{r.name}</td>
                    <td style={{ fontSize:12, color:'#86efac' }}>{r.startTime}–{r.endTime}</td>
                    <td style={{ fontSize:12, color:'#86efac' }}>{r.shuttleStart}–{r.shuttleEnd}</td>
                    <td>{fmt(r.courtCost, round)}</td>
                    <td>{fmt(r.shuttleCost, round)}</td>
                    <td className="total-col">฿{fmt(r.total, round)}</td>
                  </tr>
                ))}
              </tbody>
              <tfoot>
                <tr>
                  <td colSpan={3} style={{ textAlign:'left', color:'#4ade80', fontSize:12, textTransform:'uppercase', letterSpacing:'0.06em' }}>
                    รวมทั้งหมด
                  </td>
                  <td>{fmt(totalCourt, round)}</td>
                  <td>{fmt(totalShuttle, round)}</td>
                  <td className="total-col" style={{ fontSize:16 }}>฿{fmt(grandTotal, round)}</td>
                </tr>
              </tfoot>
            </table>
          </div>
        </div>
      );
    }

    // ─────────────────────────────────────────────
    // MAIN APP
    // ─────────────────────────────────────────────
    function App() {
      const [settings, setSettings] = useState({
        courtPricePerHour: 140,
        sessionStart: '18:00',
        sessionEnd: '21:00',
        shuttleCount: 7,
        shuttlePrice: 80,
      });
      const [players, setPlayers] = useState([makePlayer('18:00')]);
      const [round, setRound] = useState(false);
      const [errors, setErrors] = useState([]);
      const [calcResult, setCalcResult] = useState(null);
      const [exporting, setExporting] = useState(false);
      const resultRef = useRef(null);

      // Auto-calculate
      useEffect(() => {
        const errs = validate(settings, players);
        setErrors(errs);
        if (errs.length === 0 && players.length > 0) {
          setCalcResult(calculate(settings, players));
        } else {
          setCalcResult(null);
        }
      }, [settings, players]);

      const updateSetting = (key, value) =>
        setSettings(prev => ({ ...prev, [key]: value }));

      const updatePlayer = (id, field, value) =>
        setPlayers(prev => prev.map(p => p.id === id ? { ...p, [field]: value } : p));

      const addPlayer = () =>
        setPlayers(prev => [...prev, makePlayer(settings.sessionStart)]);

      const removePlayer = (id) =>
        setPlayers(prev => prev.filter(p => p.id !== id));

      const loadExample = () => {
        const ex = makeExample();
        setSettings(ex.settings);
        setPlayers(ex.players);
      };

      const clearAll = () => {
        setSettings({ courtPricePerHour: 0, sessionStart:'18:00', sessionEnd:'21:00', shuttleCount:1, shuttlePrice:0 });
        setPlayers([makePlayer('18:00')]);
      };

      const exportImage = async () => {
        if (!resultRef.current) return;
        setExporting(true);
        try {
          const canvas = await html2canvas(resultRef.current, {
            backgroundColor: '#0a1a0f', scale: 2, useCORS: true, logging: false,
          });
          const link = document.createElement('a');
          link.download = `badminton-split-${new Date().toLocaleDateString('th-TH').replace(/\//g,'-')}.png`;
          link.href = canvas.toDataURL('image/png');
          link.click();
        } catch(e) { alert('Export ล้มเหลว: ' + e.message); }
        finally { setExporting(false); }
      };

      const copyText = async () => {
        if (!calcResult) return;
        const { results, totalCourt, totalShuttle, grandTotal } = calcResult;
        const lines = [
          `🏸 Badminton Split — ${settings.sessionStart}–${settings.sessionEnd}`,
          `${'─'.repeat(42)}`,
          ...results.map(r =>
            `${r.name.padEnd(6)} สนาม: ${fmt(r.courtCost,round).padStart(8)} | ลูก: ${fmt(r.shuttleCost,round).padStart(8)} | รวม: ฿${fmt(r.total,round)}`
          ),
          `${'─'.repeat(42)}`,
          `ค่าสนามรวม : ฿${fmt(totalCourt,round)}`,
          `ค่าลูกรวม  : ฿${fmt(totalShuttle,round)}`,
          `รวมทั้งหมด : ฿${fmt(grandTotal,round)}`,
        ];
        try {
          await navigator.clipboard.writeText(lines.join('\n'));
          alert('คัดลอกสรุปค่าใช้จ่ายแล้ว! 📋');
        } catch { alert('ไม่สามารถคัดลอกได้ในบางเบราว์เซอร์ ลอง Export รูปแทนครับ'); }
      };

      const totalShuttleCost = Number(settings.shuttleCount) * Number(settings.shuttlePrice);

      return (
        <div style={{ minHeight:'100vh', backgroundColor:'#0a1a0f', paddingBottom:60 }}>

          {/* ── HEADER ── */}
          <header style={{
            position:'relative', overflow:'hidden',
            background:'#050e07', borderBottom:'1px solid #173d21',
            padding:'24px 16px'
          }}>
            {/* decorative lines */}
            <div style={{ position:'absolute', inset:0, opacity:0.05, pointerEvents:'none' }}>
              <div style={{ position:'absolute', top:0, left:'50%', transform:'translateX(-50%)', width:1, height:'100%', background:'#a3e635' }}/>
              <div style={{ position:'absolute', top:'50%', left:0, width:'100%', height:1, background:'#a3e635' }}/>
            </div>
            <div style={{ maxWidth:800, margin:'0 auto', display:'flex', alignItems:'center', justifyContent:'space-between', position:'relative' }}>
              <div>
                <h1 style={{ fontFamily:'Bebas Neue', fontSize:'clamp(32px,8vw,52px)', color:'white', letterSpacing:6, lineHeight:1, margin:0 }}>
                  BADMINTON<span style={{ color:'#a3e635' }}>.</span>SPLIT
                </h1>
                <p style={{ color:'#22c55e', fontSize:13, marginTop:4, fontWeight:500 }}>
                  คำนวณค่าใช้จ่ายยุติธรรม · แบ่งตามเวลาจริง
                </p>
              </div>
              <span style={{ fontSize:48, opacity:0.85 }}>🏸</span>
            </div>
          </header>

          <main style={{ maxWidth:800, margin:'0 auto', padding:'24px 16px' }}>

            {/* Quick actions */}
            <div style={{ display:'flex', flexWrap:'wrap', gap:8, marginBottom:24 }}>
              <button className="btn-ghost" onClick={loadExample}>🧪 โหลดตัวอย่าง</button>
              <button className="btn-ghost" onClick={clearAll}>🗑️ เคลียร์ทั้งหมด</button>
            </div>

            {/* ── COURT SETTINGS ── */}
            <section className="card" style={{ marginBottom:16, border:'1px solid #1f5229' }}>
              <h2 style={{ fontFamily:'Bebas Neue', fontSize:26, color:'#a3e635', letterSpacing:4, marginBottom:16 }}>
                COURT SETTINGS
              </h2>
              <div className="grid-settings">
                <div className="span-all">
                  <label className="input-label">ค่าสนาม (บาท/ชม.)</label>
                  <input type="number" className="input-field" min={0}
                    value={settings.courtPricePerHour}
                    onChange={e => updateSetting('courtPricePerHour', e.target.value)} />
                </div>
                <div>
                  <label className="input-label">เวลาเริ่มเล่น</label>
                  <input type="time" className="input-field"
                    value={settings.sessionStart}
                    onChange={e => updateSetting('sessionStart', e.target.value)} />
                </div>
                <div>
                  <label className="input-label">เวลาสิ้นสุด</label>
                  <input type="time" className="input-field"
                    value={settings.sessionEnd}
                    onChange={e => updateSetting('sessionEnd', e.target.value)} />
                </div>
              </div>
            </section>

            {/* ── SHUTTLECOCK ── */}
            <section className="card" style={{ marginBottom:16, border:'1px solid #1f5229' }}>
              <h2 style={{ fontFamily:'Bebas Neue', fontSize:26, color:'#a3e635', letterSpacing:4, marginBottom:16 }}>
                SHUTTLECOCK
              </h2>
              <div className="grid-2">
                <div>
                  <label className="input-label">จำนวนลูกทั้งหมด</label>
                  <input type="number" className="input-field" min={1}
                    value={settings.shuttleCount}
                    onChange={e => updateSetting('shuttleCount', e.target.value)} />
                </div>
                <div>
                  <label className="input-label">ราคาต่อลูก (บาท)</label>
                  <input type="number" className="input-field" min={0}
                    value={settings.shuttlePrice}
                    onChange={e => updateSetting('shuttlePrice', e.target.value)} />
                </div>
              </div>
              {totalShuttleCost > 0 && (
                <p style={{ marginTop:12, color:'#4ade80', fontSize:13 }}>
                  💰 ค่าลูกรวม:{' '}
                  <span style={{ color:'#a3e635', fontWeight:700 }}>
                    {totalShuttleCost.toLocaleString('th-TH')} บาท
                  </span>
                </p>
              )}
            </section>

            {/* ── PLAYERS ── */}
            <section style={{ marginBottom:16 }}>
              <div style={{ display:'flex', alignItems:'center', justifyContent:'space-between', marginBottom:12 }}>
                <h2 style={{ fontFamily:'Bebas Neue', fontSize:26, color:'#a3e635', letterSpacing:4 }}>
                  PLAYERS{' '}
                  <span style={{ color:'#166534', fontSize:20 }}>({players.length})</span>
                </h2>
                <button className="btn-primary" onClick={addPlayer}>+ เพิ่มผู้เล่น</button>
              </div>

              {players.length === 0 && (
                <div className="card" style={{ textAlign:'center', padding:'40px 20px', borderStyle:'dashed', borderColor:'#1f5229', color:'#166534' }}>
                  <p style={{ fontSize:32, marginBottom:8 }}>👤</p>
                  <p style={{ fontWeight:600 }}>ยังไม่มีผู้เล่น กด "เพิ่มผู้เล่น" เพื่อเริ่ม</p>
                </div>
              )}

              {players.map((p, i) => (
                <PlayerRow
                  key={p.id}
                  player={p}
                  index={i}
                  settings={settings}
                  onChange={updatePlayer}
                  onRemove={removePlayer}
                />
              ))}
            </section>

            {/* ── ERRORS ── */}
            {errors.length > 0 && (
              <div className="card" style={{ marginBottom:16, background:'rgba(220,38,38,0.07)', border:'1px solid rgba(220,38,38,0.3)' }}>
                <p style={{ color:'#f87171', fontWeight:600, fontSize:14, marginBottom:8 }}>ตรวจพบข้อผิดพลาด:</p>
                {errors.map((e, i) => (
                  <p key={i} style={{ color:'#fca5a5', fontSize:13, marginBottom:4 }}>{e}</p>
                ))}
              </div>
            )}

            {/* ── RESULTS ── */}
            {calcResult && (
              <section>
                {/* Controls */}
                <div style={{ display:'flex', flexWrap:'wrap', alignItems:'center', justifyContent:'space-between', gap:10, marginBottom:14 }}>
                  <h2 style={{ fontFamily:'Bebas Neue', fontSize:26, color:'#a3e635', letterSpacing:4 }}>
                    RESULTS
                  </h2>
                  <div style={{ display:'flex', flexWrap:'wrap', gap:8 }}>
                    <button
                      className="btn-round"
                      onClick={() => setRound(r => !r)}
                      style={{
                        background: round ? '#a3e635' : '#0f2a17',
                        color: round ? '#050e07' : '#4ade80',
                        border: round ? '1px solid #a3e635' : '1px solid #173d21',
                      }}
                    >
                      {round ? '✓ ปัดเศษแล้ว' : '⊙ ปัดเศษ'}
                    </button>
                    <button className="btn-ghost" onClick={copyText}>📋 คัดลอก</button>
                    <button
                      className="btn-ghost"
                      onClick={exportImage}
                      disabled={exporting}
                      style={{ opacity: exporting ? 0.6 : 1, background:'#1a3a1a', borderColor:'#2d6a2d' }}
                    >
                      {exporting ? '⏳ กำลัง Export...' : '📸 Export รูป'}
                    </button>
                  </div>
                </div>

                {/* Captured area */}
                <div
                  ref={resultRef}
                  className="card"
                  style={{ border:'1px solid #1f5229', padding:'20px 20px 24px' }}
                >
                  {/* Branding for export */}
                  <div style={{
                    display:'flex', alignItems:'center', justifyContent:'space-between',
                    marginBottom:20, paddingBottom:16, borderBottom:'1px solid #173d21'
                  }}>
                    <div>
                      <p style={{ fontFamily:'Bebas Neue', fontSize:22, color:'white', letterSpacing:4, margin:0 }}>
                        BADMINTON<span style={{ color:'#a3e635' }}>.</span>SPLIT
                      </p>
                      <p style={{ color:'#4ade80', fontSize:12, margin:'2px 0 0' }}>
                        สรุปค่าใช้จ่าย —{' '}
                        {new Date().toLocaleDateString('th-TH', { year:'numeric', month:'long', day:'numeric' })}
                      </p>
                    </div>
                    <span style={{ fontSize:30 }}>🏸</span>
                  </div>

                  <ResultsTable data={calcResult} round={round} settings={settings} />
                </div>
              </section>
            )}

            {/* Empty state */}
            {!calcResult && errors.length === 0 && players.length > 0 && (
              <div className="card" style={{ textAlign:'center', padding:'30px', borderStyle:'dashed', borderColor:'#1f5229', color:'#166534' }}>
                <p style={{ fontSize:14 }}>กรอกข้อมูลให้ครบเพื่อดูผลลัพธ์อัตโนมัติ ✨</p>
              </div>
            )}
          </main>

          <footer style={{ maxWidth:800, margin:'32px auto 0', padding:'0 16px', textAlign:'center', color:'#1f5229', fontSize:12 }}>
            คำนวณตามเวลาจริงและลูกแบดที่ใช้จริง · ยุติธรรมกับทุกคน 🏸
          </footer>
        </div>
      );
    }

    // Mount
    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
